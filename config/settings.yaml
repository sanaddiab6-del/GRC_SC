app:
  name: "SICO GRC Platform"
  version: "0.1.0"
  description: "Saudi Regulatory Compliance Engine"

supported_frameworks:
  - ecc
  - ccc
  - pdpl

languages:
  default: "en"
  supported:
    - en
    - ar

database:
  pool_size: 10
  max_overflow: 20
  echo: false

ai:
  rag:
    chunk_size: 512
    chunk_overlap: 50
    top_k: 5
  embedding:
    model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    dimension: 384

security:
  password_min_length: 12
  password_require_special: true
  password_require_uppercase: true
  password_require_number: true
  max_login_attempts: 5
  lockout_duration_minutes: 30

features:
  enable_ai: true
  enable_reports: true
  enable_audit: true
  enable_pdpl: true
