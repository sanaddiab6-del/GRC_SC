services:
  backend:
    image: sanadcom-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./db:/code/db
  huey:
    image: sanadcom-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./db:/code/db
  frontend:
    image: node:24-slim
    working_dir: /app
    command: >-
      sh -c "npm install -g pnpm && pnpm config set store-dir /pnpm-store && pnpm install --frozen-lockfile && pnpm run dev --host 0.0.0.0 --port 3000"
    environment:
      - ORIGIN=https://localhost:8443
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm-store

volumes:
  frontend_node_modules:
  frontend_pnpm_store:
