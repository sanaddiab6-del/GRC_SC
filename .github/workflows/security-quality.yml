# GitHub Actions - Security & Quality Pipeline
name: Security & Quality Checks

on:
  push:
    branches: [main, develop]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20.11.1"

jobs:

# ==========================================================
# Security Scanning
# ==========================================================

  security-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install bandit[toml] safety pip-audit bcrypt==4.1.2

      - name: Run Bandit (SAST)
        run: |
          bandit -r ai/ src/ -f sarif -o bandit-report.sarif -c pyproject.toml
        continue-on-error: true

      - name: Upload Bandit SARIF
        if: ${{ hashFiles('bandit-report.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-report.sarif
          category: bandit

      - name: Check dependencies (Safety)
        run: |
          safety check --json --output safety-report.json
        continue-on-error: true

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json

      - name: Audit Python packages
        run: |
          pip-audit --format json --output pip-audit-report.json
        continue-on-error: true

      - name: Detect secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: ${{ hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

# ==========================================================
# AI Security Tests
# ==========================================================

  ai-security-tests:
    name: AI Security Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ai/requirements.txt
          pip install -r src/backend/requirements.txt
          pip install bcrypt==4.1.2
          pip install pytest pytest-cov pytest-asyncio httpx
          pip install pydantic-settings PyJWT alembic

      - name: Clean pytest cache
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".pytest_cache" -exec rm -rf {} + 2>/dev/null || true

      - name: Run AI Security Tests
        run: |
          pytest tests/security/ -v --tb=short --cov=ai --cov-report=xml
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src:${{ github.workspace }}/src/backend:${{ github.workspace }}/ai

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: ai-security
          name: ai-security-coverage

# ==========================================================
# Code Quality
# ==========================================================

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy black isort
          pip install -r ai/requirements.txt
          pip install -r src/backend/requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run MyPy
        run: mypy ai/ src/ --config-file=pyproject.toml
        continue-on-error: true

      - name: Check formatting (Black)
        run: black --check ai/ src/ --config=pyproject.toml

      - name: Check imports (isort)
        run: isort --check-only ai/ src/ --settings-path=pyproject.toml

# ==========================================================
# Unit Tests
# ==========================================================

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sico_grc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/sico_grc_test"
      DATABASE_URL_SYNC: "postgresql://postgres:postgres@localhost:5432/sico_grc_test"
      REDIS_URL: "redis://localhost:6379/0"
      SECRET_KEY: "ci-test-secret-key-minimum-32-characters-long-for-security"
      PYTEST_RUNNING: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ai/requirements.txt
          pip install -r src/backend/requirements.txt
          pip install bcrypt==4.1.2
          pip install pytest pytest-cov pytest-asyncio httpx
          pip install pydantic-settings PyJWT alembic psycopg2-binary

      - name: Run Alembic migrations
        run: |
          cd src/backend
          alembic upgrade head || echo "⚠️ Alembic migration failed, tests will use create_all fallback"
        env:
          PYTHONPATH: ${{ github.workspace }}/src/backend:${{ github.workspace }}
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/sico_grc_test"

      - name: Debug DB connectivity
        run: |
          python -c "
          import asyncio, asyncpg
          async def check():
              conn = await asyncpg.connect('postgresql://postgres:postgres@localhost:5432/sico_grc_test')
              print('✓ asyncpg connection OK, server version:', conn.get_server_version())
              await conn.close()
          asyncio.run(check())
          "

      - name: Clean pytest cache
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".pytest_cache" -exec rm -rf {} + 2>/dev/null || true

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=ai --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src:${{ github.workspace }}/src/backend:${{ github.workspace }}/ai

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unit-tests
          name: unit-test-coverage

# ==========================================================
# SBOM Generation
# ==========================================================

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install CycloneDX
        run: |
          pip install --upgrade pip
          pip install cyclonedx-bom

      - name: Generate SBOM
        run: |
          cyclonedx-py requirements ai/requirements.txt -o sbom-ai.json
          cyclonedx-py requirements src/backend/requirements.txt -o sbom-backend.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-ai.json
            sbom-backend.json

# ==========================================================
# Gate Check
# ==========================================================

  gate-check:
    name: Gate Check Summary
    runs-on: ubuntu-latest
    needs: [security-scan, ai-security-tests, code-quality, unit-tests]
    if: always()

    steps:
      - name: Check results
        run: |
          security_scan="${{ needs.security-scan.result }}"
          ai_security_tests="${{ needs.ai-security-tests.result }}"
          code_quality="${{ needs.code-quality.result }}"
          unit_tests="${{ needs.unit-tests.result }}"

          echo "Security scan result      : ${security_scan}"
          echo "AI security tests result  : ${ai_security_tests}"
          echo "Code quality result       : ${code_quality}"
          echo "Unit tests result         : ${unit_tests}"

          if [ "${security_scan}" = "failure" ]; then
            echo "::error::Security scan failed"
            exit 1
          fi

          if [ "${ai_security_tests}" = "failure" ]; then
            echo "::error::AI Security tests failed"
            exit 1
          fi

          if [ "${code_quality}" = "failure" ]; then
            echo "::error::Code quality failed"
            exit 1
          fi

          if [ "${unit_tests}" = "failure" ]; then
            echo "::error::Unit tests failed"
            exit 1
          fi

          echo "All gate checks passed"

# ==========================================================
# Notifications
# ==========================================================

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: gate-check
    if: always()

    steps:
      - name: Success notification
        if: needs.gate-check.result == 'success'
        run: echo "All security & quality checks passed"

      - name: Failure notification
        if: needs.gate-check.result == 'failure'
        run: echo "Security or quality checks failed"