name: Security Scanning & Artifact Generation

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  FAIL_ON_SEVERITY: "HIGH,CRITICAL"

jobs:
  # ============================================================================
  # SBOM Generation Job
  # ============================================================================
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SBOM for Python dependencies
        uses: anchore/sbom-action@v0
        with:
          path: ./src/backend
          artifact-name: sbom-backend-python.spdx.json
          output-file: ./sbom-backend-python.spdx.json
          format: spdx-json
