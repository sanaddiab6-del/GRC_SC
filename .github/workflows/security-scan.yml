name: Security Scanning & Artifact Generation

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  FAIL_ON_SEVERITY: 'HIGH,CRITICAL'

jobs:
  # ============================================================================
  # SBOM Generation Job
  # ============================================================================
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SBOM for Python dependencies
        uses: anchore/sbom-action@v0
        with:
          path: ./src/backend
          artifact-name: sbom-backend-python.spdx.json
          output-file: ./sbom-backend-python.spdx.json
          format: spdx-json

      - name: Generate SBOM for Node.js dependencies
        uses: anchore/sbom-action@v0
        with:
          path: ./src/frontend
          artifact-name: sbom-frontend-nodejs.spdx.json
          output-file: ./sbom-frontend-nodejs.spdx.json
          format: spdx-json

      - name: Generate CycloneDX SBOM for Backend
        uses: CycloneDX/gh-python-generate-sbom@v2
        with:
          input: ./src/backend/requirements.txt
          output: ./sbom-backend-cyclonedx.json
          format: json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-*.json
            sbom-*.spdx.json
          retention-days: 90

      - name: Generate SBOM Summary
        run: |
          echo "# SBOM Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM files generated successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Generated SBOMs:" >> $GITHUB_STEP_SUMMARY
          ls -lh sbom-*.json 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "No SBOM files found" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Python Security Scanning
  # ============================================================================
  python-security-scan:
    name: Python Security Analysis
    runs-on: ubuntu-latest
    needs: generate-sbom
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit

      - name: Run Bandit SAST
        run: |
          bandit -r src/backend -f json -o bandit-report.json || true
          bandit -r src/backend -f sarif -o bandit-report.sarif || true

      - name: Run Safety check
        run: |
          safety check --json --output safety-report.json || true
          
      - name: Run pip-audit
        run: |
          pip-audit --desc --format json --output pip-audit-report.json || true

      - name: Upload Python security reports
        uses: actions/upload-artifact@v4
        with:
          name: python-security-reports
          path: |
            bandit-report.json
            bandit-report.sarif
            safety-report.json
            pip-audit-report.json
          retention-days: 90

      - name: Upload SARIF to GitHub Security
        if: ${{ exists('bandit-report.sarif') }}
        if: ${{ exists('bandit-report.sarif') }}
        if: ${{ exists('bandit-report.sarif') }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-report.sarif
          category: bandit

      - name: Check for critical vulnerabilities
        run: |
          # Parse JSON reports and fail on HIGH/CRITICAL
          python - << 'EOF'
          import json
          import sys
          
          has_critical = False
          
          # Check Bandit results
          try:
              with open('bandit-report.json', 'r') as f:
                  bandit_data = json.load(f)
                  high_critical = [r for r in bandit_data.get('results', []) 
                                   if r.get('issue_severity') in ['HIGH', 'CRITICAL']]
                  if high_critical:
                      print(f"❌ Found {len(high_critical)} HIGH/CRITICAL issues in Bandit scan")
                      has_critical = True
                      for issue in high_critical[:5]:  # Show first 5
                          print(f"  - {issue.get('issue_text')} (Severity: {issue.get('issue_severity')})")
          except Exception as e:
              print(f"Warning: Could not parse Bandit report: {e}")
          
          if has_critical:
              print("\n⛔ SECURITY GATE FAILED: Critical vulnerabilities found!")
              sys.exit(1)
          else:
              print("✅ No critical vulnerabilities found in Python code")
          EOF

  # ============================================================================
  # Node.js Security Scanning
  # ============================================================================
  nodejs-security-scan:
    name: Node.js Security Analysis
    runs-on: ubuntu-latest
    needs: generate-sbom
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: |
          cd src/frontend
          npm audit --json > ../../npm-audit-report.json || true
          npm audit --audit-level=high || true

      - name: Upload Node.js security reports
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-security-reports
          path: npm-audit-report.json
          retention-days: 90

  # ============================================================================
  # Container Security Scanning with Trivy
  # ============================================================================
  container-security-scan:
    name: Container Image Security Scan
    runs-on: ubuntu-latest
    needs: generate-sbom
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './src/backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './src/frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Generate Trivy JSON reports
        run: |
          docker run --rm -v $PWD:/scan aquasec/trivy:latest fs /scan/src/backend \
            --format json --output /scan/trivy-backend-report.json \
            --severity HIGH,CRITICAL || true
          
          docker run --rm -v $PWD:/scan aquasec/trivy:latest fs /scan/src/frontend \
            --format json --output /scan/trivy-frontend-report.json \
            --severity HIGH,CRITICAL || true

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: |
            trivy-*-results.sarif
            trivy-*-report.json
          retention-days: 90

      - name: Upload SARIF to GitHub Security
        if: ${{ exists('trivy-backend-results.sarif') }}
        if: ${{ exists('trivy-backend-results.sarif') }}
        if: ${{ exists('trivy-backend-results.sarif') }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

      - name: Check Trivy scan results for critical issues
        run: |
          # Fail if HIGH or CRITICAL vulnerabilities found
          python - << 'EOF'
          import json
          import sys
          
          has_critical = False
          
          for report_file in ['trivy-backend-report.json', 'trivy-frontend-report.json']:
              try:
                  with open(report_file, 'r') as f:
                      data = json.load(f)
                      results = data.get('Results', [])
                      
                      for result in results:
                          vulns = result.get('Vulnerabilities', [])
                          high_critical = [v for v in vulns 
                                          if v.get('Severity') in ['HIGH', 'CRITICAL']]
                          
                          if high_critical:
                              print(f"❌ Found {len(high_critical)} HIGH/CRITICAL vulnerabilities in {report_file}")
                              has_critical = True
                              for vuln in high_critical[:5]:  # Show first 5
                                  print(f"  - {vuln.get('VulnerabilityID')}: {vuln.get('Title')} (Severity: {vuln.get('Severity')})")
              except FileNotFoundError:
                  print(f"⚠️  Report file not found: {report_file}")
              except Exception as e:
                  print(f"Warning: Could not parse {report_file}: {e}")
          
          if has_critical:
              print("\n⛔ SECURITY GATE FAILED: Critical vulnerabilities found in dependencies!")
              sys.exit(1)
          else:
              print("✅ No critical vulnerabilities found in container scans")
          EOF

  # ============================================================================
  # CodeQL Analysis
  # ============================================================================
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'javascript' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results-${{ matrix.language }}.sarif
          upload: true

  # ============================================================================
  # Dependency Review
  # ============================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0

  # ============================================================================
  # Security Summary Report
  # ============================================================================
  security-summary:
    name: Generate Security Summary
    runs-on: ubuntu-latest
    needs: [generate-sbom, python-security-scan, nodejs-security-scan, container-security-scan]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate comprehensive security report
        run: |
          cat << 'EOF' > security-summary.md
          # 🔐 Security Scan Summary Report
          
          **Repository**: ${{ github.repository }}  
          **Branch**: ${{ github.ref_name }}  
          **Commit**: ${{ github.sha }}  
          **Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Workflow Run**: ${{ github.run_number }}
          
          ---
          
          ## 📊 Scan Status
          
          | Component | Status |
          |-----------|--------|
          | SBOM Generation | ${{ needs.generate-sbom.result }} |
          | Python Security | ${{ needs.python-security-scan.result }} |
          | Node.js Security | ${{ needs.nodejs-security-scan.result }} |
          | Container Security | ${{ needs.container-security-scan.result }} |
          
          ---
          
          ## 📦 Generated Artifacts
          
          The following security artifacts have been generated:
          
          ### SBOM (Software Bill of Materials)
          - `sbom-backend-python.spdx.json` - Python dependencies (SPDX format)
          - `sbom-frontend-nodejs.spdx.json` - Node.js dependencies (SPDX format)
          - `sbom-backend-cyclonedx.json` - Backend dependencies (CycloneDX format)
          
          ### Security Scan Reports
          - `bandit-report.json` - Python SAST results (JSON)
          - `bandit-report.sarif` - Python SAST results (SARIF)
          - `safety-report.json` - Python dependency vulnerabilities
          - `pip-audit-report.json` - Python package vulnerabilities
          - `npm-audit-report.json` - Node.js dependency vulnerabilities
          - `trivy-backend-report.json` - Backend container scan (JSON)
          - `trivy-frontend-report.json` - Frontend container scan (JSON)
          - `trivy-*-results.sarif` - Container scans (SARIF format)
          
          ---
          
          ## 🎯 NCA Compliance
          
          This security scan follows **National Cybersecurity Authority (NCA)** Saudi Arabia standards:
          
          ✅ **ECC 2-3-1**: Malware Protection - Vulnerability scanning implemented  
          ✅ **ECC 2-5-1**: Vulnerability Assessment - Automated scanning in CI/CD  
          ✅ **ECC 2-5-2**: Vulnerability Remediation - Quality gates enforce remediation  
          ✅ **CCC 3-2-1**: Secure Configuration - Container security scanning  
          ✅ **PDPL Article 20**: Security Measures - SBOM and traceability maintained
          
          ---
          
          ## 🔍 Quality Gates
          
          **Policy**: Fail on HIGH or CRITICAL severity vulnerabilities
          
          Quality gates enforce:
          - ⛔ Block deployment on CRITICAL vulnerabilities
          - ⛔ Block deployment on HIGH severity vulnerabilities
          - ⚠️  Warn on MEDIUM severity (manual review required)
          - ℹ️  Info on LOW severity (tracked, no block)
          
          ---
          
          ## 📋 Traceability
          
          **Build Provenance**:
          - Workflow: ${{ github.workflow }}
          - Run ID: ${{ github.run_id }}
          - Run Number: ${{ github.run_number }}
          - Actor: ${{ github.actor }}
          - Event: ${{ github.event_name }}
          
          **Artifact Storage**:
          All security artifacts are stored for 90 days and can be retrieved via GitHub Actions.
          
          **Attestation**:
          See `ATTESTATION.md` for build attestation details and artifact verification.
          
          ---
          
          ## 🔗 Links
          
          - [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - [Security Advisories](${{ github.server_url }}/${{ github.repository }}/security/advisories)
          - [Dependency Graph](${{ github.server_url }}/${{ github.repository }}/network/dependencies)
          
          ---
          
          **Generated by**: SICO GRC Platform Security Pipeline  
          **Compliant with**: NCA ECC, CCC, PDPL Standards
          EOF

      - name: Upload security summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary-report
          path: security-summary.md
          retention-days: 90

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
