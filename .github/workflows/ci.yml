name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sico
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: sico_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: |
          cd src/backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run linters
        continue-on-error: true
        run: |
          cd src/backend
          pip install black flake8
          black --check . || true
          flake8 . || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql://sico:test_password@localhost:5432/sico_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci
        run: |
          cd src/backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: src/backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            src/backend/htmlcov/
            src/backend/coverage.xml
          retention-days: 30

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd src/frontend
          npm ci

      - name: Run linter
        continue-on-error: true
        run: |
          cd src/frontend
          npm run lint || true

      - name: Run type check
        continue-on-error: true
        run: |
          cd src/frontend
          npm run type-check || true

      - name: Run tests
        run: |
          cd src/frontend
          npm test -- --coverage --watchAll=false

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          cd src/frontend
          npm run build

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            src/frontend/coverage/
          retention-days: 30

  ai-tests:
    name: AI/RAG Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai/requirements.txt

      - name: Install dependencies
        run: |
          cd ai
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run AI tests
        run: |
          cd ai
          pytest tests/ -v || true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/backend/Dockerfile
          push: false
          tags: sico-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test docker-compose
        run: |
          docker-compose -f deployment/docker-compose.yml config

  integration-check:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, ai-tests, docker-build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for conflict markers
        run: |
          if git grep -n '<<<<<<<\|=======\|>>>>>>>' -- ':!.github/workflows/ci.yml'; then
            echo "❌ Conflict markers found in code!"
            exit 1
          else
            echo "✅ No conflict markers found"
          fi

      - name: Validate Python imports
        run: |
          python -m compileall src/backend -q
          python -m compileall ai -q
          python -m compileall scripts -q || true

      - name: Summary
        run: |
          echo "# CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          echo "- Backend tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- AI/RAG tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- Docker build successful" >> $GITHUB_STEP_SUMMARY
          echo "- No conflict markers found" >> $GITHUB_STEP_SUMMARY
          echo "- Python imports validated" >> $GITHUB_STEP_SUMMARY
