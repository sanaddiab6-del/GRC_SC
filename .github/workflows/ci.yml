name: SICO GRC CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sico
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: sico_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: |
          cd src/backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://sico:test_password@localhost:5432/sico_test
          SECRET_KEY: test-secret-key-for-ci-32-chars-minimum-secure-key-12345
          ENCRYPTION_KEY: vS8-vS8-vS8-vS8-vS8-vS8-vS8-vS8-vS8-vS8-vS8=
        run: |
          cd src/backend
          alembic upgrade head

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://sico:test_password@localhost:5432/sico_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-32-chars-minimum-secure-key-12345
          ENCRYPTION_KEY: vS8-vS8-vS8-vS8-vS8-vS8-vS8-vS8-vS8-vS8-vS8=
          DEBUG: "True"
          PYTEST_RUNNING: "1"
          PYTHONPATH: ${{ github.workspace }}/src/backend
        run: |
          cd src/backend
          pytest ../../tests/backend --cov=. --cov-report=xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd src/frontend
          npm ci

      - name: Build frontend
        run: |
          cd src/frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          push: false
          tags: sico-backend:latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: false
          tags: sico-frontend:latest
