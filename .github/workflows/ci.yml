name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sico
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: sico_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sanadcom/src/backend/requirements.txt

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install dependencies
        run: |
          cd sanadcom/src/backend
          # Install only necessary dependencies for testing (skip ML packages)
          pip install fastapi uvicorn sqlalchemy psycopg2-binary alembic redis aioredis
          pip install pydantic pydantic-settings python-jose passlib python-dotenv cryptography PyJWT
          pip install aiosqlite asyncpg httpx aiohttp pandas openpyxl
          pip install pytest pytest-cov pytest-asyncio black flake8 mypy
          pip install azure-identity azure-keyvault-secrets pyotp qrcode pillow apscheduler

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U sico; do
            echo "Waiting for postgres..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://sico:test_password@localhost:5432/sico_test
        run: |
          cd sanadcom/src/backend
          alembic upgrade head

      - name: Run linters
        continue-on-error: true
        run: |
          cd sanadcom/src/backend
          pip install black flake8
          black --check . || true
          flake8 . || true

      - name: Run tests
        env:
          CI: true
          PYTEST_RUNNING: "1"
          DATABASE_URL: postgresql://sico:test_password@localhost:5432/sico_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci-32-chars-minimum-secure
          ENCRYPTION_KEY: test-encryption-key-base64-encoded-fernet-key-here
          PYTHONPATH: ${{ github.workspace }}
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          cd ${{ github.workspace }}
          pytest tests/backend -v --tb=short --maxfail=5 --cov=sanadcom/src/backend --cov-report=xml:sanadcom/src/backend/coverage.xml --cov-report=html:sanadcom/src/backend/htmlcov --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: sanadcom/src/backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            sanadcom/src/backend/htmlcov/
            sanadcom/src/backend/coverage.xml
          retention-days: 30

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sanadcom/src/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd sanadcom/src/frontend
          npm ci

      - name: Run linter
        continue-on-error: true
        run: |
          cd sanadcom/src/frontend
          npm run lint || true

      - name: Run type check
        continue-on-error: true
        run: |
          cd sanadcom/src/frontend
          npm run type-check || true

      - name: Run tests
        run: |
          cd sanadcom/src/frontend
          npm test -- --coverage --watchAll=false --passWithNoTests

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          cd sanadcom/src/frontend
          npm run build

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            sanadcom/src/frontend/coverage/
          retention-days: 30

  ai-tests:
    name: AI/RAG Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sanadcom/ai/requirements.txt

      - name: Install dependencies
        run: |
          cd sanadcom/ai
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run AI tests
        run: |
          cd sanadcom/ai
          pytest tests/ -v || true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./sanadcom/src/backend
          file: sanadcom/src/backend/Dockerfile
          push: false
          tags: sico-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test docker-compose
        run: |
          docker compose -f sanadcom/deployment/docker-compose.yml config

  integration-check:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, ai-tests, docker-build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for conflict markers
        run: |
          if git grep -n '<<<<<<<\|=======\|>>>>>>>' -- ':!.github/workflows/ci.yml'; then
            echo "❌ Conflict markers found in code!"
            exit 1
          else
            echo "✅ No conflict markers found"
          fi

      - name: Validate Python imports
        run: |
          python -m compileall sanadcom/src/backend -q
          python -m compileall sanadcom/ai -q
          python -m compileall sanadcom/scripts -q || true

      - name: Summary
        run: |
          echo "# CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          echo "- Backend tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- AI/RAG tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- Docker build successful" >> $GITHUB_STEP_SUMMARY
          echo "- No conflict markers found" >> $GITHUB_STEP_SUMMARY
          echo "- Python imports validated" >> $GITHUB_STEP_SUMMARY
