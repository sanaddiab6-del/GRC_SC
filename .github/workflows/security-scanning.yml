name: Security Scanning

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python (Backend)
        if: matrix.component == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js (Frontend)
        if: matrix.component == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Backend)
        if: matrix.component == 'backend'
        run: |
          cd src/backend
          pip install -r requirements.txt
          pip install safety

      - name: Install dependencies (Frontend)
        if: matrix.component == 'frontend'
        run: |
          cd src/frontend
          npm ci

      - name: Run Safety check (Backend)
        if: matrix.component == 'backend'
        continue-on-error: true
        run: |
          cd src/backend
          safety check --json > ../../safety-report.json || true
          safety check || true

      - name: Run npm audit (Frontend)
        if: matrix.component == 'frontend'
        continue-on-error: true
        run: |
          cd src/frontend
          npm audit --json > ../../npm-audit.json || true
          npm audit || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-${{ matrix.component }}
          path: |
            safety-report.json
            npm-audit.json
          retention-days: 30

  sast-python:
    name: SAST - Python (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit scan
        continue-on-error: true
        run: |
          bandit -r src/backend -f json -o bandit-report.json
          bandit -r ai -f json -o bandit-ai-report.json
          bandit -r scripts -f json -o bandit-scripts-report.json || true

      - name: Convert Bandit to SARIF
        continue-on-error: true
        run: |
          pip install bandit-sarif-formatter
          bandit -r src/backend -f sarif -o bandit.sarif || true

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Upload Bandit reports
        uses: actions/upload-artifact@v4
        with:
          name: bandit-reports
          path: |
            bandit-report.json
            bandit-ai-report.json
            bandit-scripts-report.json
            bandit.sarif
          retention-days: 30

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'javascript' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: false

      - name: Upload CodeQL SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: /home/runner/work/sanadcom/results/${{ matrix.language }}.sarif
          retention-days: 30

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CycloneDX tools
        run: |
          pip install cyclonedx-bom
          npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate Python SBOM
        run: |
          cd src/backend
          pip install -r requirements.txt
          cyclonedx-py requirements -i requirements.txt -o ../../sbom-python.json --format json

      - name: Generate Node.js SBOM
        run: |
          cd src/frontend
          npm ci
          cyclonedx-npm --output-file ../../sbom-nodejs.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-python.json
            sbom-nodejs.json
          retention-days: 90

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-python, codeql-analysis, sbom-generation, secret-scan]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Scan: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SAST (Bandit): Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CodeQL: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SBOM Generation: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Scan: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Review the Security tab for detailed findings" >> $GITHUB_STEP_SUMMARY
