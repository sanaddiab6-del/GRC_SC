[allowlist]
  description = "Allowlist for safe examples and documentation"
  paths = [
    "config/env.example",
    ".env.production.example",
    "docs/QUICKSTART_SECURITY.md",
    "scripts/generate_security_keys.ps1",
    "tests/conftest.py"
  ]
  regexes = [
    'Password123!',
    'test-secret-key-for-ci-32-chars-minimum-secure-key-12345'
  ]
