apiVersion: v1
kind: Namespace
metadata:
  name: sico-grc
  labels:
    app: sico-grc-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sico-config
  namespace: sico-grc
data:
  DATABASE_URL: "postgresql://sico_user:sico_pass@postgres:5432/sico_grc"
  REDIS_URL: "redis://redis:6379/0"
  VECTOR_DB_HOST: "chroma"
  DEFAULT_LANGUAGE: "ar"
  SUPPORTED_LANGUAGES: "ar,en"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-backend
  namespace: sico-grc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sico-backend
  template:
    metadata:
      labels:
        app: sico-backend
    spec:
      containers:
      - name: backend
        image: sico-grc/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: sico-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: sico-config
              key: REDIS_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sico-backend
  namespace: sico-grc
spec:
  selector:
    app: sico-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-frontend
  namespace: sico-grc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sico-frontend
  template:
    metadata:
      labels:
        app: sico-frontend
    spec:
      containers:
      - name: frontend
        image: sico-grc/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://sico-backend:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sico-frontend
  namespace: sico-grc
spec:
  selector:
    app: sico-frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: LoadBalancer
