version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sico-postgres
    environment:
      POSTGRES_USER: sico_user
      POSTGRES_PASSWORD: sico_password
      POSTGRES_DB: sico_grc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sico_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sico-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sico-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sico-network

  # Chroma Vector Database
  chroma:
    image: chromadb/chroma:latest
    container_name: sico-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    networks:
      - sico-network

  # Backend API
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: sico-backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: "postgresql://sico_user:sico_password@postgres:5432/sico_grc"
      REDIS_URL: "redis://redis:6379/0"
      VECTOR_DB_PATH: "http://chroma:8000"
      SECRET_KEY: "dev-secret-key-change-in-production"
    volumes:
      - ./src/backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sico-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: sico-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8001"
      NEXT_PUBLIC_WS_URL: "ws://localhost:8001"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - sico-network
    command: npm run dev

  # Celery Worker (Background Tasks)
  celery-worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: sico-celery-worker
    environment:
      DATABASE_URL: "postgresql://sico_user:sico_password@postgres:5432/sico_grc"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
    volumes:
      - ./src/backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - sico-network
    command: celery -A app.celery_app worker --loglevel=info

  # Celery Beat (Scheduled Tasks)
  celery-beat:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: sico-celery-beat
    environment:
      DATABASE_URL: "postgresql://sico_user:sico_password@postgres:5432/sico_grc"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
    volumes:
      - ./src/backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - sico-network
    command: celery -A app.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  backend_uploads:

networks:
  sico-network:
    driver: bridge
