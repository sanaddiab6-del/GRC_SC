# SOC-GRC Bridge - Incident to Control Matrix
# Integration between Security Operations Center and GRC Platform

metadata:
  name: "SOC-GRC Integration Matrix"
  version: "1.0"
  description: "Mapping between security incidents and compliance controls"
  purpose: "Automate compliance evidence from security operations"

incident_categories:
  - id: "MALWARE"
    name: "Malware Detection"
    priority: "HIGH"
    related_controls:
      ecc: ["ECC-3-12", "ECC-3-13"]
      ccc: ["CCC-3-8", "CCC-12-3"]
    evidence_generated:
      - "Incident report"
      - "Response timeline"
      - "Remediation actions"
      
  - id: "UNAUTHORIZED_ACCESS"
    name: "Unauthorized Access Attempt"
    priority: "CRITICAL"
    related_controls:
      ecc: ["ECC-3-8", "ECC-3-9"]
      ccc: ["CCC-8-7", "CCC-12-2"]
    evidence_generated:
      - "Access logs"
      - "Investigation report"
      - "Account review"
      
  - id: "DATA_BREACH"
    name: "Data Breach"
    priority: "CRITICAL"
    related_controls:
      ecc: ["ECC-3-15"]
      ccc: ["CCC-12-5"]
      pdpl: ["PDPL-Art25", "PDPL-Art26"]
    evidence_generated:
      - "Breach notification"
      - "Impact assessment"
      - "Remediation plan"
    regulatory_notification_required: true
    
  - id: "PHISHING"
    name: "Phishing Attack"
    priority: "MEDIUM"
    related_controls:
      ecc: ["ECC-1-7", "ECC-3-11"]
      ccc: ["CCC-1-8"]
    evidence_generated:
      - "Email analysis"
      - "User training records"
      - "Block list updates"
      
  - id: "DDoS"
    name: "Distributed Denial of Service"
    priority: "HIGH"
    related_controls:
      ecc: ["ECC-3-16"]
      ccc: ["CCC-5-8", "CCC-11-4"]
    evidence_generated:
      - "Traffic analysis"
      - "Mitigation actions"
      - "Service restoration timeline"

integration_workflows:
  incident_to_evidence:
    trigger: "Incident closed in SIEM/SOAR"
    actions:
      - "Extract incident details"
      - "Map to relevant controls"
      - "Generate evidence artifacts"
      - "Store in evidence repository"
      - "Update control status"
      
  compliance_to_monitoring:
    trigger: "New control implemented"
    actions:
      - "Identify monitoring requirements"
      - "Configure SIEM rules"
      - "Set up alerting"
      - "Enable log collection"

automation_capabilities:
  - "Automatic incident-to-control mapping"
  - "Evidence artifact generation"
  - "Compliance dashboard updates"
  - "Risk score adjustments"
  - "Trend analysis"
  - "Executive reporting"

metrics_tracked:
  - "Incidents by control domain"
  - "Mean time to detect (MTTD)"
  - "Mean time to respond (MTTR)"
  - "Compliance posture impact"
  - "Control effectiveness"

benefits:
  - "Automated evidence collection"
  - "Real-time compliance monitoring"
  - "Reduced manual documentation"
  - "Enhanced audit readiness"
  - "Unified security and compliance view"

notes: |
  The SOC-GRC Bridge eliminates the traditional gap between security
  operations and compliance. By automatically generating compliance
  evidence from security incidents, organizations can demonstrate
  continuous compliance and control effectiveness.
