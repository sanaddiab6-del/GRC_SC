urn: urn:intuitem:risk:library:nca-tcc-1
locale: en
ref_id: TCC-1
name: Telework Cybersecurity Controls
description: "The NCA publishes the Telework Cybersecurity Controls (TCC-1:2020).\
  \ These controls define the minimum cybersecurity requirements for telework\
  \ (remote work) environments.\n\nReference: https://nca.gov.sa/en/legislation?item=196"
copyright: "© NCA"
version: 1
publication_date: 2024-06-19
provider: NCA
packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:nca-tcc-1
    ref_id: TCC-1
    name: Telework Cybersecurity Controls
    description: Saudi National Cybersecurity Authority framework for Telework Cybersecurity Controls (TCC-1:2020)
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1
      assessable: false
      depth: 1
      ref_id: '1'
      name: Cybersecurity Governance for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1
      ref_id: 1-1
      name: Telework Cybersecurity Policies and Procedures
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1-controls
      ref_id: 1-1-1
      description: The organization must define, document, approve, and implement cybersecurity policies and procedures specifically covering telework (remote work) activities.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1-controls
      ref_id: 1-1-2
      description: Telework cybersecurity procedures must be documented detailing device requirements, access methods, data handling, and incident reporting specific to remote work.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1-3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-1-controls
      ref_id: 1-1-3
      description: Authorized telework activities, systems accessible remotely, approved locations, and permitted data types for remote access must be formally defined and documented.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1
      ref_id: 1-2
      name: Telework Cybersecurity Roles and Responsibilities
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2-controls
      ref_id: 1-2-1
      description: Cybersecurity roles and responsibilities for telework must be defined, including IT support, security monitoring, and teleworker responsibilities.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2-controls
      ref_id: 1-2-2
      description: All teleworkers must receive security awareness training covering telework-specific risks, policy requirements, safe use of remote access tools, and incident reporting.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2-3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-2-controls
      ref_id: 1-2-3
      description: A designated security contact must be available to teleworkers for reporting incidents and seeking security guidance during remote work.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1
      ref_id: 1-3
      name: Cybersecurity Risk Management for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-3-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-3
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-3-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-3-controls
      ref_id: 1-3-1
      description: Risk assessments specific to telework must be conducted, considering threats such as insecure home networks, physical proximity risks, device loss/theft, and unsecured communication channels.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:1-3-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:1-3-controls
      ref_id: 1-3-2
      description: Identified telework cybersecurity risks must be formally assessed, documented in the risk register, and residual risks accepted by management.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      assessable: false
      depth: 1
      ref_id: '2'
      name: Cybersecurity Resilience for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      ref_id: 2-1
      name: Asset Management for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-1-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-1
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-1-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-1-controls
      ref_id: 2-1-1
      description: An inventory of all devices authorized for telework (issued or BYOD) must be maintained, including device identifiers, assigned users, and security configuration status.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-1-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-1-controls
      ref_id: 2-1-2
      description: Telework devices must be classified and managed with controls appropriate to the sensitivity of data accessible and activities permitted.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      ref_id: 2-2
      name: Identity and Access Management for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-controls
      ref_id: 2-2-1
      description: Multi-Factor Authentication (MFA) must be enforced for all remote access to organizational systems and resources.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-controls
      ref_id: 2-2-2
      description: All remote access to organizational networks and systems must use approved VPN or equivalent secure connectivity solutions with strong encryption.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-controls
      ref_id: 2-2-3
      description: The principle of least privilege must be enforced for remote access sessions, restricting access to only the systems and data required for the teleworker's role.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-2-controls
      ref_id: 2-2-4
      description: Automatic session timeouts must be configured for remote access sessions, with re-authentication required after defined idle periods.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      ref_id: 2-3
      name: Security Configurations for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3-controls
      ref_id: 2-3-1
      description: Telework devices must be configured according to approved security baselines, including disabling unnecessary services, enabling firewall and full-disk encryption.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3-controls
      ref_id: 2-3-2
      description: Unnecessary features, applications, and ports on remote devices must be disabled or removed to minimize the attack surface.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3-3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-3-controls
      ref_id: 2-3-3
      description: Mobile Device Management (MDM) or equivalent solution must be used to enforce and verify security configurations on telework devices remotely.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      ref_id: 2-4
      name: Cybersecurity Vulnerability Management for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-4-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-4
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-4-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-4-controls
      ref_id: 2-4-1
      description: Operating systems and applications on telework devices must be kept up-to-date with security patches applied promptly, including automated update mechanisms where possible.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-4-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-4-controls
      ref_id: 2-4-2
      description: Security scans and vulnerability assessments must be conducted on telework devices to identify and remediate weaknesses.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      ref_id: 2-5
      name: Cybersecurity Event Logs and Monitoring for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-5-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-5
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-5-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-5-controls
      ref_id: 2-5-1
      description: Logging must be enabled for all remote access sessions, capturing user identity, access time, duration, systems accessed, and actions performed.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-5-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-5-controls
      ref_id: 2-5-2
      description: Remote access sessions must be monitored for security anomalies, unauthorized activity, and policy violations, with alerts sent to the security team.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      ref_id: 2-6
      name: Cybersecurity Incident and Threat Management for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-6-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-6
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-6-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-6-controls
      ref_id: 2-6-1
      description: Incident response procedures must be defined for telework-specific security incidents, including device loss/theft, remote session compromise, and data exposure.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-6-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-6-controls
      ref_id: 2-6-2
      description: A clear, easily accessible reporting channel must be provided to teleworkers for reporting security incidents, suspicious activities, or policy violations.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      ref_id: 2-7
      name: Data and Information Protection for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7-controls
      ref_id: 2-7-1
      description: Full-disk encryption must be enabled on all telework devices to protect data in the event of device loss or theft.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7-controls
      ref_id: 2-7-2
      description: Storage of sensitive organizational data on personal devices or unapproved personal cloud storage services must be prohibited.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7-3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-7-controls
      ref_id: 2-7-3
      description: DLP controls must be implemented for telework scenarios to prevent unauthorized data exfiltration through email, removable media, or cloud uploads during remote sessions.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2
      ref_id: 2-8
      name: Cybersecurity Resilience and Recovery for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-8-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-8
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-8-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-8-controls
      ref_id: 2-8-1
      description: Business continuity plans must include telework capabilities as a continuity option, with defined procedures for transitioning to and from remote work during disruptions.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:2-8-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:2-8-controls
      ref_id: 2-8-2
      description: Recovery procedures for telework infrastructure (VPN, remote access gateway, collaboration tools) must be tested periodically.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:3
      assessable: false
      depth: 1
      ref_id: '3'
      name: Managing Cybersecurity of Third-Party Providers for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:3
      ref_id: 3-1
      name: Third-Party Cybersecurity Management for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1-controls
      ref_id: 3-1-1
      description: Third-party vendors and contractors accessing organizational systems remotely must be subject to equivalent telework cybersecurity requirements as internal employees.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1-controls
      ref_id: 3-1-2
      description: Cybersecurity requirements for remote access by third parties must be documented in contracts and service agreements.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1-3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:3-1-controls
      ref_id: 3-1-3
      description: Third-party remote access must be monitored and audited, with access privileges revoked immediately upon contract termination.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4
      assessable: false
      depth: 1
      ref_id: '4'
      name: Cybersecurity of Telework Infrastructure and Components
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4
      ref_id: 4-1
      name: Telework Devices Management
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1-controls
      ref_id: 4-1-1
      description: Approved, organization-managed devices must be provided for telework whenever possible, with BYOD permitted only under strict controls and formal approval.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1-controls
      ref_id: 4-1-2
      description: Endpoint protection (antivirus/EDR), host-based firewall, and intrusion detection must be installed and active on all telework devices.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1-3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-1-controls
      ref_id: 4-1-3
      description: Remote wipe capability must be enabled on all telework devices to allow secure erasure of organizational data in the event of loss or theft.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4
      ref_id: 4-2
      name: Network Security Configuration for Telework
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-2-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-2
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-2-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-2-controls
      ref_id: 4-2-1
      description: All remote access connections must use encrypted VPN tunnels or equivalent approved technologies; direct internet connections to internal resources must not be permitted.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-2-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-2-controls
      ref_id: 4-2-2
      description: Network segmentation must be implemented to separate remote access entry points from sensitive internal networks, with access controlled through firewalls and access control lists.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4
      ref_id: 4-3
      name: Security Configuration for Telework Applications
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3-controls
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3
      name: Controls
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3-1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3-controls
      ref_id: 4-3-1
      description: Collaboration tools and communication applications approved for telework must be security-configured including encryption, access controls, and data sharing restrictions.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3-2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3-controls
      ref_id: 4-3-2
      description: Security patches for telework applications and remote access software must be applied promptly to address known vulnerabilities.
    - urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3-3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:nca-tcc-1:4-3-controls
      ref_id: 4-3-3
      description: Only approved and vetted applications may be installed on telework devices; unauthorized software installation must be prevented through technical controls or policy enforcement.
