# Ruff Configuration - Fast Python Linter
# Replaces: flake8, isort, pyupgrade, autoflake

[tool.ruff]
target-version = "py311"
line-length = 100
indent-width = 4

# Enable all rules by default, then selectively disable
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "ANN", # flake8-annotations
    "S",   # flake8-bandit (security)
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "DTZ", # flake8-datetimez
    "T10", # flake8-debugger
    "EM",  # flake8-errmsg
    "ISC", # flake8-implicit-str-concat
    "G",   # flake8-logging-format
    "PIE", # flake8-pie
    "T20", # flake8-print
    "PT",  # flake8-pytest-style
    "Q",   # flake8-quotes
    "RET", # flake8-return
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "ERA", # eradicate (commented code)
    "PL",  # pylint
    "RUF", # ruff-specific rules
]

ignore = [
    "ANN101", # Missing type annotation for `self` in method
    "ANN102", # Missing type annotation for `cls` in classmethod
    "ANN401", # Dynamically typed expressions (Any) are disallowed
    "S101",   # Use of `assert` detected (allow in tests)
    "PLR0913", # Too many arguments to function call
    "PLR2004", # Magic value used in comparison
]

# Exclude specific directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "migrations",  # Alembic migrations
]

[tool.ruff.per-file-ignores]
# Allow print statements in scripts
"scripts/*.py" = ["T20"]
# Allow assert in tests
"tests/*.py" = ["S101", "PLR2004"]
"tests/**/*.py" = ["S101", "PLR2004"]

[tool.ruff.isort]
known-first-party = ["ai", "src"]
combine-as-imports = true

[tool.ruff.flake8-quotes]
inline-quotes = "double"

# ============================================================================
# MyPy Configuration - Static Type Checking
# ============================================================================

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = false  # FastAPI decorators
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
pretty = true
show_error_codes = true
show_error_context = true
show_column_numbers = true

# Per-module overrides
[[tool.mypy.overrides]]
module = [
    "langchain.*",
    "chromadb.*",
    "sqlalchemy.*",
    "alembic.*",
]
ignore_missing_imports = true

# ============================================================================
# Pytest Configuration - Testing Framework
# ============================================================================

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Test output options
addopts = [
    "-ra",              # Show summary of all test types
    "-q",               # Quiet mode
    "--strict-markers", # Error on unknown markers
    "--strict-config",  # Error on config issues
    "--tb=short",       # Short traceback format
    "--cov=ai",         # Coverage for ai package
    "--cov=src",        # Coverage for src package
    "--cov-report=term-missing",  # Show missing lines
    "--cov-report=html",          # HTML coverage report
    "--cov-fail-under=80",        # Fail if coverage < 80%
]

# Markers for test categorization
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "security: marks tests as security tests (prompt injection, etc.)",
    "unit: marks tests as unit tests",
    "requires_db: marks tests that require database",
    "requires_gpu: marks tests that require GPU",
]

# Test discovery patterns
testpaths = ["tests"]
norecursedirs = [
    ".*",
    "build",
    "dist",
    "CVS",
    "_darcs",
    "{arch}",
    "*.egg",
    "venv",
    "node_modules",
]

# Asyncio support
asyncio_mode = "auto"

# ============================================================================
# Coverage Configuration
# ============================================================================

[tool.coverage.run]
source = ["ai", "src"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__init__.py",
    "*/migrations/*",
    "*/scripts/*",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "@overload",
]

[tool.coverage.html]
directory = "htmlcov"

# ============================================================================
# Black Configuration - Code Formatter
# ============================================================================

[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | migrations
)/
'''

# ============================================================================
# Bandit Configuration - Security Linter
# ============================================================================

[tool.bandit]
exclude_dirs = [
    "tests",
    "migrations",
    "venv",
]
skips = [
    "B101",  # assert_used (allow in tests)
]

# ============================================================================
# isort Configuration - Import Sorting
# ============================================================================

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["ai", "src"]
known_third_party = [
    "fastapi",
    "pydantic",
    "sqlalchemy",
    "langchain",
    "chromadb",
]
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
