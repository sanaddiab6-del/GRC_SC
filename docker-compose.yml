version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sico_postgres
    environment:
      POSTGRES_DB: sico_grc
      POSTGRES_USER: sico_user
      POSTGRES_PASSWORD: sico_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sico_user -d sico_grc"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sico_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: sico_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: sico_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sico_user:sico_pass@postgres:5432/sico_grc
      - REDIS_URL=redis://redis:6379/0
      - VECTOR_DB_HOST=chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    volumes:
      - ./src/backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: sico_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  chroma_data:
