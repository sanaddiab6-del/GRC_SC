# MyPy configuration for SICO GRC Platform
# https://mypy.readthedocs.io/en/stable/config_file.html

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True
no_implicit_optional = True
strict_equality = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Exclude directories
exclude = (?x)(
    ^migrations/versions/
    | ^\.venv/
    | ^venv/
    | ^node_modules/
    | ^build/
    | ^dist/
    | ^\.git/
  )

# Per-module overrides
[mypy-tests.*]
disallow_untyped_defs = False
ignore_errors = True

[mypy-migrations.*]
ignore_errors = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-chromadb.*]
ignore_missing_imports = True

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True
