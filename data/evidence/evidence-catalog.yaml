# Evidence Master Catalog
# Unified evidence repository for audit-ready compliance

metadata:
  name: "SICO Evidence Master Catalog"
  version: "1.0"
  description: "Comprehensive catalog of evidence types for ECC, CCC, and PDPL compliance"
  total_evidence_types: 150

evidence_categories:
  - id: "POL"
    name: "Policies"
    description: "High-level statements of intent"
    retention: "3 years after superseded"
    
  - id: "PROC"
    name: "Procedures"
    description: "Step-by-step operational instructions"
    retention: "3 years after superseded"
    
  - id: "TECH"
    name: "Technical Configurations"
    description: "System settings and configurations"
    retention: "Current + 2 years"
    
  - id: "LOG"
    name: "Logs and Records"
    description: "System and activity logs"
    retention: "1-3 years depending on type"
    
  - id: "TRAIN"
    name: "Training Records"
    description: "Employee training completion records"
    retention: "5 years"
    
  - id: "ASSESS"
    name: "Assessments"
    description: "Risk assessments, vulnerability scans, audits"
    retention: "3 years"
    
  - id: "CONTRACT"
    name: "Contracts and Agreements"
    description: "Vendor contracts, SLAs, NDAs"
    retention: "7 years after termination"
    
  - id: "REGISTER"
    name: "Registers"
    description: "Asset register, incident register, PDPL registers"
    retention: "Ongoing + 3 years"

# Sample evidence items
sample_evidence:
  - id: "EV-001"
    name: "Cybersecurity Policy"
    category: "POL"
    frameworks: ["ECC", "CCC"]
    controls: ["ECC-1-1", "CCC-1-1"]
    template: "yes"
    bilingual: true
    
  - id: "EV-002"
    name: "Risk Assessment Report"
    category: "ASSESS"
    frameworks: ["ECC", "CCC", "PDPL"]
    controls: ["ECC-2-1", "CCC-1-5", "PDPL-Art27"]
    template: "yes"
    bilingual: true
    
  - id: "EV-003"
    name: "Access Control List (ACL) Configuration"
    category: "TECH"
    frameworks: ["ECC", "CCC"]
    controls: ["ECC-3-8", "CCC-8-3"]
    template: "no"
    bilingual: false
    
  - id: "EV-004"
    name: "Security Awareness Training Records"
    category: "TRAIN"
    frameworks: ["ECC", "CCC"]
    controls: ["ECC-1-7", "CCC-1-8"]
    template: "yes"
    bilingual: true
    
  - id: "EV-005"
    name: "Register of Processing Activities (RoPA)"
    category: "REGISTER"
    frameworks: ["PDPL"]
    controls: ["PDPL-Art16"]
    template: "yes"
    bilingual: true
    required: true
    
  - id: "EV-006"
    name: "Data Breach Notification Log"
    category: "REGISTER"
    frameworks: ["PDPL"]
    controls: ["PDPL-Art25"]
    template: "yes"
    bilingual: true
    required: true

automation_capabilities:
  - "Template generation with pre-filled fields"
  - "Evidence collection workflows"
  - "Automated evidence mapping to controls"
  - "Version control and audit trail"
  - "Bilingual template support (Arabic/English)"
  - "Bulk evidence upload and tagging"
  - "Evidence gap analysis"
  - "Audit package generation"

template_features:
  - "Professional formatting"
  - "Bilingual headers and sections"
  - "Pre-defined structures"
  - "Fillable fields with guidance"
  - "Version tracking"
  - "Digital signatures support"
  - "Export to multiple formats (PDF, DOCX, XLSX)"

notes: |
  The Evidence Master Catalog is a key differentiator that accelerates
  compliance implementation. Pre-built templates reduce preparation time
  from weeks to days and ensure audit readiness.
