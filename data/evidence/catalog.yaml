# Evidence Master Catalog
# Comprehensive catalog of evidence types for audit readiness

categories:
  - id: "POL"
    name: "Policies and Procedures"
    name_ar: "السياسات والإجراءات"
    evidence_types:
      - type: "Information Security Policy"
        required_by: ["ECC-1.1.1", "CCC-1.1.2"]
        format: ["PDF", "DOCX"]
        retention_years: 3
        
      - type: "Risk Management Policy"
        required_by: ["ECC-2.1.1"]
        format: ["PDF", "DOCX"]
        retention_years: 3
        
  - id: "LOG"
    name: "Logs and Records"
    name_ar: "السجلات والتقارير"
    evidence_types:
      - type: "Access Logs"
        required_by: ["ECC-3.2.1", "CCC-4.1.1"]
        format: ["CSV", "JSON", "SYSLOG"]
        retention_months: 12
        
      - type: "Security Event Logs"
        required_by: ["ECC-4.3.1"]
        format: ["CSV", "JSON"]
        retention_months: 12
        
  - id: "CERT"
    name: "Certifications and Attestations"
    name_ar: "الشهادات والإقرارات"
    evidence_types:
      - type: "Third Party Audit Report"
        required_by: ["ECC-5.1.1", "CCC-2.2.1"]
        format: ["PDF"]
        retention_years: 5
        
      - type: "Penetration Test Report"
        required_by: ["ECC-4.2.1"]
        format: ["PDF"]
        retention_years: 3
        
  - id: "REG"
    name: "Registers and Inventories"
    name_ar: "السجلات والجرد"
    evidence_types:
      - type: "Asset Inventory"
        required_by: ["ECC-4.1.1"]
        format: ["XLSX", "CSV"]
        update_frequency: "quarterly"
        
      - type: "RoPA (Record of Processing Activities)"
        required_by: ["PDPL-1.1"]
        format: ["XLSX", "PDF"]
        update_frequency: "monthly"

templates:
  - template_id: "TPL-001"
    name: "Information Security Policy Template"
    framework: ["ECC", "CCC"]
    language: ["en", "ar"]
    format: "DOCX"
    sections: 15
    
  - template_id: "TPL-002"
    name: "RoPA Template"
    framework: ["PDPL"]
    language: ["en", "ar"]
    format: "XLSX"
    columns: 22
