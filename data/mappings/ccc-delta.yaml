      total_controls: 221  # 114 ECC baseline + 107 CCC delta
      ccc_delta_required: 107
      effort_increase: "94%"  # 107/114 = 94% more controls
      
    hybrid_cloud:
      applicable_frameworks: ["ECC", "CCC"]
      total_controls: 221
      implementation_note: "Implement ECC for on-premise + CCC delta for cloud portion"
      scoping_required: true

