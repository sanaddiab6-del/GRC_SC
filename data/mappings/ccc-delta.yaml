# CCC Delta Analysis
# Cloud Cybersecurity Controls UNIQUE to CCC (not in ECC)
# Total CCC-Unique Controls: 107 (183 - 76 common)

metadata:
  title: "CCC Delta - Cloud-Specific Controls"
  description: "Controls that exist ONLY in CCC, not in ECC baseline"
  version: "1.0"
  last_updated: "2024-01-01"
  
  summary:
    total_ccc_controls: 183
    ecc_baseline_covered: 76
    ccc_unique_controls: 107
    delta_percentage: 58.5  # 107/183 = 58.5% of CCC is cloud-specific

# ============================================
# CCC-Unique Control Categories
# ============================================

unique_control_categories:
  - category: "Cloud Service Provider (CSP) Controls"
    control_range: "CCC-CSP-01 to CCC-CSP-35"
    total_controls: 35
    description: "Controls applicable only to cloud service providers (CSPs)"
    applies_to: "CSPs (hyperscalers, managed service providers)"
    rationale: "No ECC equivalent as ECC focuses on customers, not providers"
    
  - category: "Cloud Service Customer (CSC) Controls"
    control_range: "CCC-CSC-01 to CCC-CSC-17"
    total_controls: 17
    description: "Controls applicable only to cloud service customers"
    applies_to: "Organizations consuming cloud services"
    rationale: "Cloud-specific customer responsibilities not in ECC"
    
  - category: "Cloud Governance Extensions"
    control_range: "CCC-GOV-06 to CCC-GOV-28"
    total_controls: 15
    description: "Cloud-specific governance controls beyond ECC baseline"
    applies_to: "All cloud deployments"
    rationale: "Multi-cloud, SLAs, and cloud contract management"
    
  - category: "Cloud Defense Extensions"
    control_range: "CCC-DEF-43 to CCC-DEF-62"
    total_controls: 20
    description: "Cloud-specific defense controls (container security, serverless, etc.)"
    applies_to: "All cloud deployments"
    rationale: "Cloud-native architectures not covered in ECC"
    
  - category: "Cloud Resilience Extensions"
    control_range: "CCC-RES-30 to CCC-RES-41"
    total_controls: 12
    description: "Cloud-specific resilience (multi-region DR, cloud backup, etc.)"
    applies_to: "All cloud deployments"
    rationale: "Cloud availability patterns different from on-premise"

# ============================================
# CCC-CSP Controls (35 controls)
# Provider-side controls for CSPs
# ============================================

csp_controls:
  - control_id: "CCC-CSP-01"
    title_en: "Physical Security of Data Centers"
    title_ar: "الأمن الفعلي لمراكز البيانات"
    category: "Physical Security"
    description: "CSP shall implement physical security controls for data centers including perimeter security, access control, surveillance, and environmental controls."
    applies_to: "Cloud Service Providers"
    not_in_ecc_reason: "ECC does not specify provider-side physical security requirements"
    
  - control_id: "CCC-CSP-02"
    title_en: "Hypervisor Security"
    title_ar: "أمن الهايبر فايزر"
    category: "Virtualization"
    description: "CSP shall secure hypervisor layer with hardening, patching, isolation, and monitoring controls."
    applies_to: "IaaS Providers"
    not_in_ecc_reason: "Hypervisor security is CSP responsibility, not addressed in ECC"
    
  - control_id: "CCC-CSP-10"
    title_en: "Multi-Tenancy Isolation"
    title_ar: "عزل تعدد المستأجرين"
    category: "Isolation"
    description: "CSP shall ensure strong isolation between tenants at compute, storage, and network layers."
    applies_to: "All CSPs"
    not_in_ecc_reason: "Multi-tenancy is cloud-specific concept not in ECC"
    
  - control_id: "CCC-CSP-15"
    title_en: "Cloud Portability and Interoperability"
    title_ar: "قابلية نقل السحابة والتشغيل البيني"
    category: "Portability"
    description: "CSP shall support data portability and API interoperability to prevent vendor lock-in."
    applies_to: "All CSPs"
    not_in_ecc_reason: "Cloud portability not applicable to on-premise (ECC focus)"
    
  # 31 more CSP controls...

# ============================================
# CCC-CSC Controls (17 controls)
# Customer-side cloud-specific controls
# ============================================

csc_controls:
  - control_id: "CCC-CSC-01"
    title_en: "Cloud Service Provider Assessment"
    title_ar: "تقييم مزود الخدمة السحابية"
    category: "Vendor Management"
    description: "Customer shall conduct risk assessment of CSP including certification review, security posture evaluation, and contractual security requirements."
    applies_to: "Cloud Customers"
    extends_ecc: "ECC-TM-1 (Vendor Management)"
    delta: "Adds cloud-specific assessment criteria (shared responsibility, data residency, certifications)"
    
  - control_id: "CCC-CSC-02"
    title_en: "Cloud Identity and Access Management"
    title_ar: "إدارة الهوية والوصول السحابي"
    category: "Access Control"
    description: "Customer shall implement cloud IAM with least privilege, MFA, federation, and regular access reviews."
    applies_to: "Cloud Customers"
    extends_ecc: "ECC-DP-1 (Access Control)"
    delta: "Adds cloud IAM specifics (federation, cloud roles, service accounts)"
    
  - control_id: "CCC-CSC-05"
    title_en: "Cloud Configuration Management"
    title_ar: "إدارة تكوين السحابة"
    category: "Configuration"
    description: "Customer shall implement infrastructure-as-code (IaC) for cloud configuration management with version control and approval workflows."
    applies_to: "Cloud Customers"
    not_in_ecc_reason: "IaC and cloud configuration management not in ECC"
    
  - control_id: "CCC-CSC-08"
    title_en: "Container Security"
    title_ar: "أمن الحاويات"
    category: "Containers"
    description: "Customer shall secure containerized workloads with image scanning, runtime protection, and orchestration security (Kubernetes)."
    applies_to: "Cloud Customers using containers"
    not_in_ecc_reason: "Container technology not covered in ECC"
    
  - control_id: "CCC-CSC-12"
    title_en: "Serverless Security"
    title_ar: "أمن الحوسبة بدون خادم"
    category: "Serverless"
    description: "Customer shall secure serverless functions with least privilege IAM, input validation, and dependency scanning."
    applies_to: "Cloud Customers using serverless"
    not_in_ecc_reason: "Serverless architectures not in ECC"
    
  # 12 more CSC controls...

# ============================================
# Cloud Governance Extensions (15 controls)
# ============================================

governance_extensions:
  - control_id: "CCC-GOV-06"
    title_en: "Cloud Service Level Agreements"
    title_ar: "اتفاقيات مستوى الخدمة السحابية"
    extends_ecc: "None"
    delta: "CCC-specific SLA requirements for cloud services"
    rationale: "SLAs critical for cloud services, not applicable to on-premise"
    
  - control_id: "CCC-GOV-09"
    title_en: "Multi-Cloud Governance"
    title_ar: "حوكمة السحابة المتعددة"
    extends_ecc: "None"
    delta: "Governance framework for multi-cloud environments"
    rationale: "Multi-cloud strategy not in ECC scope"
    
  - control_id: "CCC-GOV-12"
    title_en: "Cloud Cost Optimization"
    title_ar: "تحسين تكلفة السحابة"
    extends_ecc: "None"
    delta: "Cloud cost management and optimization controls"
    rationale: "OpEx cloud model requires different cost controls than CapEx on-premise"
    
  # 12 more governance extensions...

