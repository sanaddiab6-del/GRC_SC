# RoPA - Register of Processing Activities
# سجل أنشطة معالجة البيانات الشخصية
# Required by PDPL Article 16

metadata:
  register_type: "RoPA"
  full_name: "Register of Processing Activities"
  arabic_name: "سجل أنشطة معالجة البيانات الشخصية"
  legal_basis: "PDPL Article 16"
  required_for: "All Data Controllers and Processors"
  update_frequency: "Continuous - update whenever processing activities change"
  retention_period: "3 years after processing activity ceases"

register_structure:
  fields:
    - id: "activity_id"
      name: "Activity ID"
      name_ar: "رقم النشاط"
      type: "text"
      required: true
      
    - id: "processing_purpose"
      name: "Purpose of Processing"
      name_ar: "الغرض من المعالجة"
      type: "text"
      required: true
      
    - id: "legal_basis"
      name: "Legal Basis"
      name_ar: "الأساس القانوني"
      type: "select"
      options: ["Consent", "Contract", "Legal Obligation", "Vital Interests", "Public Interest", "Legitimate Interest"]
      required: true
      
    - id: "data_categories"
      name: "Categories of Personal Data"
      name_ar: "فئات البيانات الشخصية"
      type: "multiselect"
      options: ["Identity Data", "Contact Data", "Financial Data", "Health Data", "Employment Data", "Location Data"]
      required: true
      
    - id: "data_subjects"
      name: "Categories of Data Subjects"
      name_ar: "فئات أصحاب البيانات"
      type: "multiselect"
      options: ["Customers", "Employees", "Suppliers", "Partners", "Website Visitors"]
      required: true
      
    - id: "recipients"
      name: "Recipients of Data"
      name_ar: "المستلمون"
      type: "text"
      required: false
      
    - id: "transfers"
      name: "International Transfers"
      name_ar: "النقل الدولي"
      type: "text"
      required: false
      
    - id: "retention_period"
      name: "Retention Period"
      name_ar: "مدة الاحتفاظ"
      type: "text"
      required: true
      
    - id: "security_measures"
      name: "Security Measures"
      name_ar: "التدابير الأمنية"
      type: "text"
      required: true
      
    - id: "dpo_contact"
      name: "DPO Contact"
      name_ar: "معلومات مسؤول حماية البيانات"
      type: "text"
      required: true

compliance_checklist:
  - "All processing activities documented"
  - "Legal basis identified for each activity"
  - "Data categories clearly defined"
  - "Retention periods specified"
  - "Security measures documented"
  - "International transfers mapped"
  - "Register updated regularly"
  - "Management approval obtained"

audit_considerations:
  - "Completeness of entries"
  - "Accuracy of information"
  - "Regular updates"
  - "Management oversight"
  - "Alignment with actual practices"

notes: |
  The RoPA is a fundamental PDPL requirement. Organizations must maintain
  an accurate and up-to-date register of all personal data processing
  activities. This register serves as the foundation for PDPL compliance.
