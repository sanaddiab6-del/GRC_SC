    days_to_complete: 26

workflow:
  step_1:
    action: "Receive Request"
    owner: "Privacy Team / DPO"
    tasks:
      - "Log request in DSAR system"
      - "Acknowledge receipt within 48 hours"
      - "Assign unique request ID"
      
  step_2:
    action: "Verify Identity"
    owner: "Privacy Team"
    tasks:
      - "Request government-issued ID"
      - "Verify via Absher (for Saudi nationals)"
      - "Document verification method"
    sla: "5 business days"
    
  step_3:
    action: "Assess Request"
    owner: "Privacy Team + DPO"
    tasks:
      - "Determine request type and scope"
      - "Identify systems to search"
      - "Check for exemptions or limitations"
      - "Assess complexity (simple vs complex)"
    sla: "3 business days"
    
  step_4:
    action: "Search and Collect Data"
    owner: "Privacy Team + IT"
    tasks:
      - "Search identified systems"
      - "Collect relevant personal data"
      - "Redact third-party information"
      - "Prepare response package"
    sla: "15 business days"
    
  step_5:
    action: "Review and Approve"
    owner: "DPO"
    tasks:
      - "Review completeness of response"
      - "Verify no over-disclosure"
      - "Approve final response"
    sla: "3 business days"
    
  step_6:
    action: "Deliver Response"
    owner: "Privacy Team"
    tasks:
      - "Send response via secure method"
      - "Update DSAR log"
      - "Close request"
    sla: "2 business days"
    
  total_sla: "30 days (PDPL requirement)"

metrics_tracking:
  - metric: "DSAR Volume"
    calculation: "Total requests per month/quarter"
    target: "N/A (demand-driven)"
    
  - metric: "SLA Compliance Rate"
    calculation: "(Requests completed within 30 days / Total requests) * 100"
    target: ">95%"
    
  - metric: "Average Response Time"
    calculation: "Average days from request to response"
    target: "<20 days"
    
  - metric: "Fulfillment Rate"
    calculation: "(Fulfilled requests / Total requests) * 100"
    target: ">90%"
    
  - metric: "Extension Rate"
    calculation: "(Extended requests / Total requests) * 100"
    target: "<10%"

compliance_notes:
  - "30-day response deadline is strict (PDPL Article 13)"
  - "Extension of 30 days allowed for complex requests (must notify requester)"
  - "Identity verification mandatory to prevent fraud"
  - "Rejection must be justified with legal basis"
  - "Right to complain to SDAIA must be communicated"
  - "Free of charge for first request; reasonable fee for excessive/repeat requests"
  - "Response must be in clear, plain language"
  - "Electronic format preferred unless requester requests paper"

related_documents:
  - "DSAR Policy and Procedure"
  - "Identity Verification Procedure"
  - "Data Subject Rights Information Notice"
  - "SDAIA Complaint Escalation Process"
