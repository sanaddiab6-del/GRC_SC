    response_format: "pdf"
    fees_charged: 0.00
    sla_compliance: true
    days_to_complete: 21
    
  - request_id: "DSAR-2024-002"
    request_date: "2024-01-20 14:15:00"
    request_type: "erasure"
    requester_name: "فاطمة سعيد"
    requester_email: "fatima.s@email.com"
    requester_id_verified: true
    request_details: "Please delete all my personal data. I no longer wish to use your services"
    assigned_to: "Mohammed Ali - Privacy Team"
    priority: "medium"
    due_date: "2024-02-19"
    status: "completed"
    response_date: "2024-02-15 10:30:00"
