# Data Breach Incident Log Template
# PDPL Article 19 Requirement (72-hour breach notification)
# Version: 1.0

metadata:
  document_name: "Personal Data Breach Incident Log"
  document_name_ar: "سجل حوادث خرق البيانات الشخصية"
  legal_basis: "PDPL Article 19"
  purpose: "Track and manage personal data breaches with 72-hour SDAIA notification requirement"
  update_frequency: "Real-time (per incident)"
  owner: "Data Protection Officer / Incident Response Team"
  retention_period: "7 years"
  critical_sla: "72 hours to notify SDAIA"

breach_severity_levels:
  - level: "critical"
    level_name_ar: "حرج"
    criteria:
      - "Large-scale breach (>10,000 data subjects)"
      - "Sensitive personal data exposed (health, financial, biometric)"
      - "High risk of identity theft or fraud"
      - "Media attention or public disclosure"
    sdaia_notification: "Within 24 hours"
    data_subject_notification: "Required immediately"
    executive_escalation: "CEO + Board"
    
  - level: "high"
    level_name_ar: "عالي"
    criteria:
      - "Medium-scale breach (1,000-10,000 data subjects)"
      - "Confidential data exposed"
      - "Potential for significant harm"
    sdaia_notification: "Within 48 hours"
    data_subject_notification: "Required within 72 hours"
    executive_escalation: "CEO + CISO"
    
  - level: "medium"
    level_name_ar: "متوسط"
    criteria:
      - "Small-scale breach (100-1,000 data subjects)"
      - "Limited sensitive data"
      - "Low to medium risk of harm"
    sdaia_notification: "Within 72 hours"
    data_subject_notification: "May be required based on risk"
    executive_escalation: "CISO + DPO"
    
  - level: "low"
    level_name_ar: "منخفض"
    criteria:
      - "Minor breach (<100 data subjects)"
      - "Non-sensitive data"
      - "Minimal risk of harm"
    sdaia_notification: "Within 72 hours (if reportable)"
    data_subject_notification: "Not required unless high risk develops"
    executive_escalation: "DPO"

breach_log_fields:
  - name: incident_id
    type: "string"
    description: "Unique breach incident identifier"
    example: "BREACH-2024-001"
    format: "BREACH-YYYY-NNN"
    
  - name: incident_title
    type: "string"
    description: "Brief description of incident"
    example_en: "Unauthorized Access to Customer Database"
    example_ar: "وصول غير مصرح به إلى قاعدة بيانات العملاء"
    
  - name: discovery_date
    type: "datetime"
    description: "Date and time breach was discovered"
    example: "2024-01-15 09:30:00"
    importance: "Start of 72-hour clock for SDAIA notification"
    
  - name: occurrence_date
    type: "datetime"
    description: "Estimated date breach occurred (if different from discovery)"
    example: "2024-01-10 22:00:00"
    
  - name: breach_type
    type: "enum"
    options:
      - "unauthorized_access"
      - "data_loss"
      - "data_theft"
      - "accidental_disclosure"
      - "ransomware"
      - "insider_threat"
      - "phishing"
      - "misconfiguration"
      - "lost_device"
      - "improper_disposal"
    example: "unauthorized_access"
    
  - name: breach_cause
    type: "text"
    description: "Root cause of breach"
    example: "SQL injection vulnerability in customer portal allowed attacker to access database"
    
  - name: severity_level
    type: "enum"
    options: ["critical", "high", "medium", "low"]
    example: "high"
    
  - name: data_subjects_affected
    type: "integer"
    description: "Number of individuals affected"
    example: 5234
    
  - name: data_categories_breached
    type: "array"
    description: "Types of personal data exposed"
    example:
      - "Full name"
      - "National ID number"
      - "Email address"
      - "Phone number"
      - "Home address"
      - "Purchase history"
      
  - name: sensitive_data_involved
    type: "boolean"
    description: "Whether sensitive personal data was breached"
    example: true
    sensitive_categories:
      - "Health data"
      - "Financial data (bank accounts, credit cards)"
      - "Biometric data"
      - "Criminal records"
      - "Children's data"
      
  - name: systems_affected
    type: "array"
    description: "Systems or databases involved"
    example:
      - "Customer CRM (Salesforce)"
      - "MySQL Database Server (prod-db-01)"
      - "Backup Storage (AWS S3)"
      
  - name: containment_actions
    type: "text"
    description: "Immediate actions taken to contain breach"
    example: |
      - 09:45 - Disabled compromised user accounts
      - 10:00 - Blocked attacker IP addresses at firewall
      - 10:30 - Took affected database offline
      - 11:00 - Reset all customer passwords
      - 12:00 - Engaged forensics team
      
  - name: containment_date
    type: "datetime"
    description: "When breach was fully contained"
    example: "2024-01-15 12:00:00"
    
  - name: data_exfiltrated
    type: "boolean"
    description: "Whether data was stolen/copied by attacker"
    example: true
    exfiltration_volume: "2.3 GB (estimated 50,000 records)"
    
  - name: encryption_status
    type: "enum"
    options: ["encrypted", "partially_encrypted", "not_encrypted"]
    example: "not_encrypted"
    impact: "Unencrypted data significantly increases risk"
    
  - name: risk_assessment
    type: "text"
    description: "Assessment of risk to data subjects"
    example: |
      HIGH RISK: 
      - National ID numbers exposed (identity theft risk)
      - Unencrypted data easily usable by attacker
      - Large number of affected individuals (5,234)
      - Data includes contact details (phishing risk)
      Recommendation: Notify all affected data subjects
      
  - name: sdaia_notification_required
    type: "boolean"
    description: "Whether SDAIA notification is required"
    example: true
    determination: "Yes - breach affects >1,000 individuals and involves personal identifiers"
    
  - name: sdaia_notification_date
    type: "datetime"
    description: "Date SDAIA was notified"
    example: "2024-01-17 10:00:00"
    compliance: "Within 72 hours (48 hours actual)"
    
  - name: sdaia_reference_number
    type: "string"
    description: "SDAIA case reference number"
    example: "SDAIA-BR-2024-00123"
    
  - name: data_subject_notification_required
    type: "boolean"
    description: "Whether data subjects must be notified"
    example: true
    determination: "Yes - high risk breach requiring individual notification"
    
  - name: data_subject_notification_date
    type: "datetime"
    description: "Date data subjects were notified"
    example: "2024-01-18 14:00:00"
    
  - name: notification_method
    type: "array"
    description: "How data subjects were notified"
    example:
      - "Email notification to all affected customers"
      - "SMS alert sent"
      - "Website banner notice"
      - "Media release (for public awareness)"
      
  - name: notification_content
    type: "text"
    description: "Summary of notification sent to data subjects"
    example: |
      We are writing to inform you of a security incident that may have affected your personal information.
      On January 15, 2024, we discovered unauthorized access to our customer database.
      
      What happened: An attacker exploited a vulnerability to access customer records.
      What data was affected: Name, National ID, email, phone, address.
      What we are doing: We have secured our systems, engaged forensics experts, and reported to authorities.
      What you should do: Monitor your accounts, be alert for phishing, change passwords.
      
      We sincerely apologize and are committed to preventing future incidents.
      
  - name: remediation_actions
    type: "array"
    description: "Actions taken to prevent recurrence"
    example:
      - "Patched SQL injection vulnerability"
      - "Implemented WAF rules"
      - "Enhanced input validation"
      - "Deployed database encryption (AES-256)"
      - "Implemented database activity monitoring"
      - "Conducted security awareness training for developers"
      - "Engaged third-party penetration testing"
      
  - name: remediation_completion_date
    type: "date"
    description: "When remediation was completed"
    example: "2024-02-15"
    
  - name: estimated_cost
    type: "decimal"
    description: "Financial impact of breach"
    currency: "SAR"
    example: 850000
    breakdown:
      forensics: 150000
      legal_fees: 200000
      notification_costs: 50000
      remediation: 300000
      regulatory_fine: 0  # pending
      reputation_damage: 150000
      
  - name: regulatory_fine
    type: "decimal"
    description: "Fine imposed by SDAIA (if any)"
    currency: "SAR"
    example: 0
    status: "Under investigation by SDAIA"
    potential_range: "100,000 - 1,000,000 SAR"
    
  - name: lessons_learned
    type: "text"
    description: "Key takeaways from incident"
    example: |
      1. Need for regular vulnerability scanning and penetration testing
      2. Database should have been encrypted at rest
      3. Incident response plan worked well but notification templates need improvement
      4. Security awareness training for developers is critical
      5. Consider bug bounty program to identify vulnerabilities proactively
      
  - name: incident_status
    type: "enum"
    options: ["open", "contained", "remediated", "closed"]
    example: "remediated"
    
  - name: incident_owner
    type: "string"
    description: "Person responsible for incident response"
    example: "محمد علي - CISO (Mohammed Ali)"
    
  - name: last_updated
    type: "datetime"
    description: "Last update to incident record"
    example: "2024-02-15 16:30:00"

sample_breach_incidents:
  - incident_id: "BREACH-2024-001"
    incident_title: "Unauthorized Access to Customer Database"
    discovery_date: "2024-01-15 09:30:00"
    occurrence_date: "2024-01-10 22:00:00"
    breach_type: "unauthorized_access"
    breach_cause: "SQL injection vulnerability in customer portal"
    severity_level: "high"
    data_subjects_affected: 5234
    data_categories_breached:
      - "Full name"
      - "National ID"
      - "Email"
      - "Phone"
      - "Address"
    sensitive_data_involved: true
    systems_affected: ["Customer CRM", "MySQL Database"]
    containment_date: "2024-01-15 12:00:00"
    data_exfiltrated: true
    encryption_status: "not_encrypted"
    sdaia_notification_required: true
    sdaia_notification_date: "2024-01-17 10:00:00"
    sdaia_compliance: "48 hours (within 72-hour requirement)"
    data_subject_notification_required: true
    data_subject_notification_date: "2024-01-18 14:00:00"
    notification_method: ["Email", "SMS", "Website Notice"]
    incident_status: "remediated"
    estimated_cost: 850000
    regulatory_fine: 0  # Under investigation

72_hour_timeline_tracking:
  hour_0:
    time: "2024-01-15 09:30"
    event: "Breach discovered by security monitoring"
    action: "Incident response team activated"
    
  hour_1:
    time: "2024-01-15 10:30"
    event: "Initial assessment completed"
    action: "DPO notified, severity determined as HIGH"
    
  hour_3:
    time: "2024-01-15 12:30"
    event: "Breach contained"
    action: "Affected systems isolated, attacker access revoked"
    
  hour_6:
    time: "2024-01-15 15:30"
    event: "Impact assessment completed"
    action: "5,234 data subjects affected confirmed"
    
  hour_24:
    time: "2024-01-16 09:30"
    event: "SDAIA notification draft prepared"
    action: "Legal and DPO review"
    
  hour_48:
    time: "2024-01-17 09:30"
    event: "SDAIA officially notified"
    action: "Breach report submitted via SDAIA portal"
    status: "✓ COMPLIANT (within 72 hours)"
    
  hour_72:
    time: "2024-01-18 09:30"
    event: "Data subject notification sent"
    action: "5,234 emails + SMS sent to affected individuals"

sdaia_notification_template:
  required_information:
    - "Nature of the breach"
    - "Categories of personal data affected"
    - "Approximate number of data subjects affected"
    - "Name and contact details of DPO"
    - "Likely consequences of the breach"
    - "Measures taken or proposed to address the breach"
    - "Measures to mitigate possible adverse effects"
  
  format: "PDF document + online form"
  language: "Arabic or English"
  channel: "SDAIA Privacy Portal (https://sdaia.gov.sa/breach-report)"

compliance_checklist:
  - "✓ Breach discovered and logged within 1 hour"
  - "✓ Initial assessment completed within 3 hours"
  - "✓ Breach contained within 6 hours"
  - "✓ Impact assessment completed within 24 hours"
  - "✓ SDAIA notified within 72 hours"
  - "✓ Data subjects notified (if high risk)"
  - "✓ Remediation plan documented"
  - "✓ Root cause analysis completed"
  - "✓ Lessons learned captured"
  - "✓ Incident report approved by DPO and CISO"

related_documents:
  - "Incident Response Plan"
  - "Data Breach Response Procedure"
  - "SDAIA Breach Notification Form"
  - "Data Subject Breach Notification Template"
  - "Forensics Investigation Report"
  - "Post-Incident Review Report"
