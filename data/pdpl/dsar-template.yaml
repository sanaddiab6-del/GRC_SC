# DSAR - Data Subject Access Requests Log
# سجل طلبات أصحاب البيانات
# Required by PDPL Articles 9-14

metadata:
  register_type: "DSAR"
  full_name: "Data Subject Access Requests Log"
  arabic_name: "سجل طلبات أصحاب البيانات"
  legal_basis: "PDPL Articles 9-14"
  response_deadline: "30 days (extendable to 60 days with justification)"
  retention_period: "3 years"

request_types:
  - id: "ACCESS"
    name: "Right to Access"
    name_ar: "الحق في الوصول"
    article: "PDPL Article 9"
    
  - id: "RECTIFICATION"
    name: "Right to Rectification"
    name_ar: "الحق في التصحيح"
    article: "PDPL Article 10"
    
  - id: "ERASURE"
    name: "Right to Erasure"
    name_ar: "الحق في المحو"
    article: "PDPL Article 11"
    
  - id: "RESTRICTION"
    name: "Right to Restrict Processing"
    name_ar: "الحق في تقييد المعالجة"
    article: "PDPL Article 12"
    
  - id: "PORTABILITY"
    name: "Right to Data Portability"
    name_ar: "الحق في نقل البيانات"
    article: "PDPL Article 13"
    
  - id: "OBJECTION"
    name: "Right to Object"
    name_ar: "الحق في الاعتراض"
    article: "PDPL Article 14"

register_fields:
  - id: "request_id"
    name: "Request ID"
    required: true
    
  - id: "received_date"
    name: "Date Received"
    required: true
    
  - id: "request_type"
    name: "Type of Request"
    required: true
    
  - id: "data_subject_info"
    name: "Data Subject Information"
    required: true
    
  - id: "verification_method"
    name: "Identity Verification Method"
    required: true
    
  - id: "response_deadline"
    name: "Response Deadline"
    required: true
    
  - id: "status"
    name: "Status"
    options: ["Received", "In Progress", "Completed", "Rejected"]
    required: true
    
  - id: "completion_date"
    name: "Date Completed"
    required: false
    
  - id: "outcome"
    name: "Outcome"
    required: true
    
  - id: "notes"
    name: "Notes"
    required: false

workflow_steps:
  1. "Receive and log request"
  2. "Verify data subject identity"
  3. "Assess request validity"
  4. "Search for personal data"
  5. "Prepare response"
  6. "Review by DPO/Legal"
  7. "Send response to data subject"
  8. "Update log with outcome"

sla_requirements:
  standard_response_time: "30 days"
  extended_response_time: "60 days (with notification to data subject)"
  acknowledgment_time: "3 days"

notes: |
  Organizations must maintain a comprehensive log of all data subject
  requests and demonstrate timely responses. This register is critical
  for PDPL compliance and will be reviewed during audits.
