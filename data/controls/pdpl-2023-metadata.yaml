key_definitions:
  personal_data: "Any data that identifies or can be used to identify a natural person directly or indirectly"
  sensitive_data: "Data related to race, ethnic origin, political opinions, religious beliefs, health, genetic data, biometric data, or criminal records"
  data_controller: "Entity that determines the purposes and means of processing personal data"
  data_processor: "Entity that processes personal data on behalf of the controller"
  data_subject: "The natural person whose personal data is being processed"
  processing: "Any operation performed on personal data"

key_principles:
  - "Lawfulness and Transparency"
  - "Purpose Limitation"
  - "Data Minimization"
  - "Accuracy"
  - "Storage Limitation"
  - "Integrity and Confidentiality"
  - "Accountability"

data_subject_rights:
  - "Right to Access"
  - "Right to Rectification"
  - "Right to Erasure"
  - "Right to Restrict Processing"
  - "Right to Data Portability"
  - "Right to Object"
  - "Right to Withdraw Consent"

required_registers:
  - name: "RoPA"
    full_name: "Register of Processing Activities"
    description: "Record of all personal data processing activities"
    
  - name: "DSAR"
    full_name: "Data Subject Access Requests"
    description: "Log of all data subject rights requests"
    
  - name: "Breach Register"
    full_name: "Personal Data Breach Register"
    description: "Record of all data breaches and notifications"
    
  - name: "Retention Schedule"
    full_name: "Data Retention Schedule"
    description: "Record of retention periods for different data types"

penalties:
  tier_1: "Up to SAR 2 million for minor violations"
  tier_2: "Up to SAR 3 million for moderate violations"
  tier_3: "Up to SAR 5 million for serious violations"

notes: |
  PDPL is Saudi Arabia's comprehensive data protection law, aligning with
  international standards like GDPR. Organizations must implement proper
  governance, technical measures, and maintain compliance registers.
