# NCA Cloud Cybersecurity Controls (CCC)
# Saudi National Cybersecurity Authority
# Version: 1.0 (2020)
# Total Controls: 183 across 5 domains
# Reference: https://nca.gov.sa/pages/ccc.html

metadata:
  framework: CCC
  version: "1.0"
  release_date: "2020-06-01"
  authority: "National Cybersecurity Authority (NCA)"
  country: "Saudi Arabia"
  language: ["ar", "en"]
  total_controls: 183
  baseline_ecc: true  # CCC builds on ECC baseline
  domains:
    - id: GOV
      name_en: "Governance"
      name_ar: "الحوكمة"
      control_count: 28
      ecc_overlap: 13
    - id: DEF
      name_en: "Defense"
      name_ar: "الدفاع"
      control_count: 62
      ecc_overlap: 35
    - id: RES
      name_en: "Resilience"
      name_ar: "المرونة"
      control_count: 41
      ecc_overlap: 28
    - id: CSP
      name_en: "Cloud Service Provider Controls"
      name_ar: "ضوابط مزود الخدمات السحابية"
      control_count: 35
      ecc_overlap: 0
    - id: CSC
      name_en: "Cloud Service Customer Controls"
      name_ar: "ضوابط عميل الخدمات السحابية"
      control_count: 17
      ecc_overlap: 0

controls:
  # ============================================
  # Domain 1: Governance (GOV) - 28 Controls
  # ============================================
  
  # CCC-GOV-01: Equivalent to ECC-GV-1
  - control_id: CCC-GOV-01
    domain: GOV
    subdomain: "Cloud Governance"
    relationship_to_ecc: "equivalent"
    ecc_mapping: ["ECC-GV-1"]
    title_en: "Cloud Cybersecurity Governance Framework"
    title_ar: "إطار حوكمة الأمن السيبراني السحابي"
    reference: "CCC v1.0, Section 2.1, Page 18"
    
    official_text_en: |
      The organization shall establish and maintain a comprehensive cloud cybersecurity governance framework 
      that ensures effective oversight, accountability, and decision-making processes for cloud computing activities.
    
    official_text_ar: |
      يجب على المنظمة إنشاء والحفاظ على إطار شامل لحوكمة الأمن السيبراني السحابي يضمن الرقابة الفعالة 
      والمساءلة وعمليات اتخاذ القرار لأنشطة الحوسبة السحابية.
    
    intent_en: |
      Extend ECC-GV-1 governance framework to explicitly address cloud computing risks, responsibilities, 
      and service models (IaaS, PaaS, SaaS). Ensure governance covers multi-cloud and hybrid cloud scenarios.
    
    intent_ar: |
      توسيع إطار حوكمة ECC-GV-1 لمعالجة مخاطر الحوسبة السحابية والمسؤوليات ونماذج الخدمة 
      (IaaS، PaaS، SaaS) بشكل صريح. ضمان أن الحوكمة تغطي سيناريوهات السحابة المتعددة والهجينة.
    
    applicability:
      entity_types: ["government", "critical_infrastructure", "financial", "health", "telecom", "education"]
      deployment_models: ["cloud", "hybrid"]
      cloud_service_models: ["IaaS", "PaaS", "SaaS"]
      mandatory: true
      applies_to: ["cloud_customers", "cloud_providers"]
    
    implementation_outcomes:
      - outcome_en: "Cloud governance policy extending on-premise governance to cloud"
        outcome_ar: "سياسة حوكمة السحابة تمتد حوكمة المباني إلى السحابة"
      - outcome_en: "Shared responsibility model documented per cloud service type"
        outcome_ar: "نموذج المسؤولية المشتركة موثق لكل نوع خدمة سحابية"
      - outcome_en: "Cloud-specific risk assessment integrated into governance reviews"
        outcome_ar: "تقييم المخاطر الخاص بالسحابة متكامل في مراجعات الحوكمة"
      - outcome_en: "Multi-cloud governance framework if using multiple CSPs"
        outcome_ar: "إطار حوكمة متعدد السحابات في حالة استخدام مزودين متعددين"
      - outcome_en: "Cloud exit strategy documented as part of governance"
        outcome_ar: "استراتيجية الخروج من السحابة موثقة كجزء من الحوكمة"
    
    evidence_requirements:
      - evidence_type: cloud_governance_policy
        format: ["PDF", "DOCX"]
        frequency: annual
        owner_role: "Cloud Security Officer"
        retention_years: 7
        sample_available: true
      - evidence_type: shared_responsibility_matrix
        format: ["PDF", "XLSX"]
        frequency: per_service
        owner_role: "Cloud Architect"
        retention_years: 5
        sample_available: true
      - evidence_type: cloud_risk_assessment
        format: ["PDF"]
        frequency: annual
        owner_role: "Risk Manager"
        retention_years: 5
        sample_available: true
      - evidence_type: cloud_exit_strategy
        format: ["PDF", "DOCX"]
        frequency: per_service
        owner_role: "Cloud Architect"
        retention_years: 5
        sample_available: true
    
    test_procedure:
      method: "Document Review & Cloud Architecture Validation"
      steps:
        - step_en: "Review cloud governance policy for shared responsibility model coverage"
          step_ar: "مراجعة سياسة حوكمة السحابة لتغطية نموذج المسؤولية المشتركة"
        - step_en: "Verify shared responsibility matrices exist for each cloud service"
          step_ar: "التحقق من وجود مصفوفات مسؤولية مشتركة لكل خدمة سحابية"
        - step_en: "Confirm cloud-specific risks documented in risk register"
          step_ar: "تأكيد توثيق المخاطر الخاصة بالسحابة في سجل المخاطر"
        - step_en: "Review cloud exit strategy for data portability and migration plan"
          step_ar: "مراجعة استراتيجية الخروج من السحابة لنقل البيانات وخطة الترحيل"
      sampling: "Review all active cloud services (IaaS, PaaS, SaaS)"
      expected_result: "Cloud governance framework extending ECC-GV-1 with cloud-specific controls"
    
    cross_framework_mapping:
      ECC: ["ECC-GV-1"]
      PDPL: ["Article 3", "Article 25"]  # Processor requirements
      ISO27001: ["5.1", "5.37"]  # Governance and supplier relationships
      ISO27017: ["5.1.1"]  # Cloud governance
      NIST_CSF: ["GV.OC-01", "GV.SC-01"]
      CSA_CCM: ["GRM-01", "GRM-02"]
    
    priority: critical
    maturity_target: 4
    implementation_complexity: high
    estimated_effort_days: 30
    delta_from_ecc: "Adds cloud-specific governance, shared responsibility, and multi-cloud management"

  # CCC-GOV-06: CCC-Unique Control (Cloud Service Agreements)
  - control_id: CCC-GOV-06
    domain: GOV
    subdomain: "Cloud Contracts"
    relationship_to_ecc: "unique"
    ecc_mapping: []
    title_en: "Cloud Service Level Agreements (SLA)"
    title_ar: "اتفاقيات مستوى الخدمة السحابية"
    reference: "CCC v1.0, Section 2.6, Page 28"
    
    official_text_en: |
      The organization shall establish and maintain comprehensive Service Level Agreements (SLAs) with 
      cloud service providers that define availability, performance, security, and support requirements.
      SLAs must include security incident notification timelines and data breach notification procedures.
    
    official_text_ar: |
      يجب على المنظمة إنشاء والحفاظ على اتفاقيات مستوى خدمة شاملة مع مزودي الخدمات السحابية 
      تحدد متطلبات التوفر والأداء والأمان والدعم. يجب أن تتضمن اتفاقيات مستوى الخدمة جداول زمنية 
      لإخطار الحوادث الأمنية وإجراءات إخطار خرق البيانات.
    
    intent_en: |
      Ensure cloud service providers contractually commit to security and availability standards that 
      meet regulatory and business requirements. Define clear responsibilities, notification procedures, 
      and remediation commitments in case of service degradation or security incidents.
    
    intent_ar: |
      ضمان أن مزودي الخدمات السحابية يلتزمون تعاقدياً بمعايير الأمان والتوفر التي تلبي 
      المتطلبات التنظيمية والتجارية. تحديد المسؤوليات الواضحة وإجراءات الإخطار والتزامات 
      الإصلاح في حالة تدهور الخدمة أو الحوادث الأمنية.
    
    applicability:
      entity_types: ["government", "critical_infrastructure", "financial", "health", "telecom", "education"]
      deployment_models: ["cloud", "hybrid"]
      cloud_service_models: ["IaaS", "PaaS", "SaaS"]
      mandatory: true
      applies_to: ["cloud_customers"]
    
    implementation_outcomes:
      - outcome_en: "Signed SLAs with all cloud service providers"
        outcome_ar: "اتفاقيات مستوى خدمة موقعة مع جميع مزودي الخدمات السحابية"
      - outcome_en: "SLAs define 99.9%+ availability commitment for critical services"
        outcome_ar: "اتفاقيات مستوى الخدمة تحدد التزام توفر 99.9٪+ للخدمات الحرجة"
      - outcome_en: "Security incident notification within 24 hours contractually required"
        outcome_ar: "إخطار الحوادث الأمنية خلال 24 ساعة مطلوب تعاقدياً"
      - outcome_en: "Data breach notification within 72 hours per PDPL Article 19"
        outcome_ar: "إخطار خرق البيانات خلال 72 ساعة حسب المادة 19 من PDPL"
      - outcome_en: "SLA performance monitored monthly with escalation process"
        outcome_ar: "أداء اتفاقية مستوى الخدمة مراقب شهرياً مع عملية تصعيد"
      - outcome_en: "Right to audit clauses included in all cloud contracts"
        outcome_ar: "بنود حق التدقيق مدرجة في جميع عقود السحابة"
    
    evidence_requirements:
      - evidence_type: cloud_service_agreements
        format: ["PDF"]
        frequency: per_service
        owner_role: "Procurement Manager"
        retention_years: 7
        sample_available: false
      - evidence_type: sla_monitoring_reports
        format: ["PDF", "XLSX"]
        frequency: monthly
        owner_role: "Cloud Operations"
        retention_years: 3
        sample_available: true
      - evidence_type: sla_breach_incident_log
        format: ["XLSX"]
        frequency: as_needed
        owner_role: "Cloud Operations"
        retention_years: 5
        sample_available: true
      - evidence_type: vendor_security_certifications
        format: ["PDF"]
        frequency: annual
        owner_role: "Vendor Manager"
        retention_years: 5
        sample_available: true
    
    test_procedure:
      method: "Contract Review & SLA Monitoring Validation"
      steps:
        - step_en: "Review cloud contracts for SLA clauses covering availability, performance, security"
          step_ar: "مراجعة عقود السحابة لبنود اتفاقية مستوى الخدمة التي تغطي التوفر والأداء والأمان"
        - step_en: "Verify security incident notification timelines (< 24 hours)"
          step_ar: "التحقق من جداول إخطار الحوادث الأمنية (< 24 ساعة)"
        - step_en: "Confirm data breach notification procedures align with PDPL Article 19"
          step_ar: "تأكيد أن إجراءات إخطار خرق البيانات تتوافق مع المادة 19 من PDPL"
        - step_en: "Sample 6 months of SLA monitoring reports for compliance tracking"
          step_ar: "عينة من 6 أشهر من تقارير مراقبة اتفاقية مستوى الخدمة لتتبع الامتثال"
        - step_en: "Verify right-to-audit clauses and third-party certification requirements"
          step_ar: "التحقق من بنود حق التدقيق ومتطلبات شهادة الطرف الثالث"
      sampling: "Review all critical cloud service contracts"
      expected_result: "Comprehensive SLAs with security commitments and monitoring evidence"
    
    cross_framework_mapping:
      ECC: []  # No direct ECC equivalent
      PDPL: ["Article 19", "Article 25"]  # Data breach notification and processor requirements
      ISO27001: ["5.19", "5.20", "5.21"]  # Supplier relationships
      ISO27017: ["5.1.2", "A.15.1.1"]  # Supplier agreements
      NIST_CSF: ["GV.SC-02", "GV.SC-03", "ID.SC-01"]
      CSA_CCM: ["STA-01", "STA-02"]
    
    priority: high
    maturity_target: 4
    implementation_complexity: medium
    estimated_effort_days: 20
    delta_from_ecc: "CCC-unique: Cloud-specific SLA and contract management not in ECC"

  # Add placeholder for remaining 181 controls
  # This is a representative sample

# Governance Domain continues with:
# CCC-GOV-02 through CCC-GOV-28 (28 controls total)

# Defense Domain (DEF):
