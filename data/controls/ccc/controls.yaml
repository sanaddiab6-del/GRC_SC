# Resilience Domain (RES):
# CCC-RES-01 through CCC-RES-41 (41 controls - includes ECC-RE baseline + cloud-specific)

# Cloud Service Provider Controls (CSP):
# CCC-CSP-01 through CCC-CSP-35 (35 CCC-unique controls for CSPs)

# Cloud Service Customer Controls (CSC):
# CCC-CSC-01 through CCC-CSC-17 (17 CCC-unique controls for cloud customers)

delta_analysis:
  total_ccc_controls: 183
  ecc_baseline_controls: 114
  ecc_equivalent: 76  # CCC controls that match ECC
  ecc_extended: 55    # CCC controls that build on ECC
  ccc_unique: 52      # CCC-only controls (CSP + CSC domains)
  
  unique_ccc_focus_areas:
    - "Multi-tenancy security"
    - "Cloud data lifecycle management"
    - "Cloud key management and encryption"
    - "Cloud monitoring and logging"
    - "Cloud incident response"
    - "Cloud backup and DR"
    - "Hypervisor and virtualization security"
    - "Container and orchestration security"
    - "Cloud API security"
    - "Cloud identity federation"

notes:
  - "CCC extends ECC with 69 additional cloud-specific controls"
  - "All CCC controls are tagged with relationship_to_ecc (equivalent, extended, unique)"
  - "Shared responsibility model is central to CCC"
  - "CCC covers both cloud customers and cloud service providers"
  - "Full 183 controls available in domain-specific files"
