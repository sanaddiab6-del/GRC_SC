      ecc: ["ECC-DP-1", "ECC-DP-2", "ECC-DP-3", "ECC-DP-4", "ECC-DP-5", "ECC-DP-6", "ECC-DP-7"]
      ccc: ["CCC-DEF-01", "CCC-DEF-02", "CCC-DEF-03", "CCC-DEF-04", "CCC-DEF-05", "CCC-DEF-06", "CCC-DEF-07", "CCC-CSC-02"]
      pdpl: ["PDPL-21"]  # Access control for processors
    total_controls: 16
    
  - domain_id: "data_protection"
    name_en: "Data Protection & Privacy"
    name_ar: "حماية البيانات والخصوصية"
    controls:
      ecc: ["ECC-DP-15", "ECC-DP-16", "ECC-DP-17", "ECC-DP-18", "ECC-DP-19"]
      ccc: ["CCC-DEF-28", "CCC-DEF-29", "CCC-DEF-30", "CCC-CSP-10", "CCC-CSP-11"]
      pdpl: ["PDPL-7", "PDPL-8", "PDPL-9", "PDPL-10", "PDPL-11", "PDPL-12", "PDPL-13", "PDPL-14", "PDPL-15", "PDPL-16", "PDPL-17", "PDPL-18", "PDPL-19", "PDPL-20", "PDPL-22", "PDPL-23", "PDPL-24", "PDPL-25", "PDPL-26"]
