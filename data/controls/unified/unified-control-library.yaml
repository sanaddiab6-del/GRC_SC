# Mapping Matrix: Control Relationships
control_relationships:
  - ecc_control: "ECC-GV-1"
    ccc_equivalent: "CCC-GOV-01"
    pdpl_mapping: ["PDPL-1", "PDPL-3"]
    relationship: "ECC baseline extended by CCC for cloud, supported by PDPL governance"
    
  - ecc_control: "ECC-GV-3"
    ccc_equivalent: "CCC-GOV-03"
    pdpl_mapping: ["PDPL-27"]
    relationship: "Risk management extended to include DPIA for privacy risks"
    
  - ecc_control: "ECC-DP-15"
    ccc_equivalent: "CCC-DEF-28"
    pdpl_mapping: ["PDPL-7", "PDPL-8", "PDPL-9", "PDPL-10", "PDPL-22"]
    relationship: "Data protection technical controls mapped to PDPL legal requirements"
    
  - ecc_control: "ECC-RE-5"
    ccc_equivalent: "CCC-RES-15"
    pdpl_mapping: ["PDPL-19"]
    relationship: "Incident response aligned with 72-hour breach notification requirement"
    
  - ecc_control: "ECC-TM-1"
    ccc_equivalent: "CCC-CSC-01"
    pdpl_mapping: ["PDPL-25", "PDPL-26"]
    relationship: "Vendor management extended to cloud and PDPL processor requirements"

# Compliance Scoring Model
compliance_scoring:
  methodology: "Weighted average across frameworks"
  weights:
    ecc: 0.40  # 40% weight
    ccc: 0.35  # 35% weight (for cloud deployments)
    pdpl: 0.25 # 25% weight
  
  maturity_levels:
    0: "Non-existent"
    1: "Initial/Ad-hoc"
    2: "Repeatable"
    3: "Defined"
    4: "Managed"
    5: "Optimizing"
  
  compliance_thresholds:
    audit_ready: 0.80    # 80% controls at maturity level 3+
    certification_ready: 0.90  # 90% controls at maturity level 4+
    excellence: 0.95     # 95% controls at maturity level 4+

# Implementation Priorities
implementation_priorities:
  phase_1_critical:
    - "ECC-GV-1"  # Governance
    - "ECC-GV-3"  # Risk management
    - "ECC-DP-1"  # Access control
    - "ECC-DP-15" # Data protection
    - "ECC-DP-20" # Encryption
    - "ECC-RE-5"  # Incident response
    - "PDPL-7"    # Lawful basis
    - "PDPL-19"   # Breach notification
    - "PDPL-13"   # Right to access
    
  phase_2_high:
    - "ECC-DP-23" # Monitoring
    - "ECC-DP-26" # Vulnerability management
    - "ECC-RE-8"  # Business continuity
    - "ECC-TM-1"  # Vendor management
    - "CCC-GOV-06" # Cloud SLAs
    - "PDPL-22"   # Security measures
    - "PDPL-25"   # Processor agreements
    
  phase_3_medium:
    - "All remaining ECC Defense controls"
    - "All remaining CCC cloud controls"
    - "All remaining PDPL data subject rights"
    
  phase_4_optimization:
    - "Advanced threat detection"
    - "AI-powered compliance monitoring"
    - "Automated evidence collection"

# Evidence Collection Strategy
evidence_collection:
  automated:
    - "System configurations (backups, logs)"
    - "Access control lists"
    - "Vulnerability scan reports"
    - "Monitoring dashboards"
    - "Incident logs"
    - "Consent records"
    - "DSAR logs"
    
  semi_automated:
    - "Policy documents (version controlled)"
    - "Risk assessments (template-driven)"
    - "Training completion records"
    - "Vendor certifications"
    
  manual:
    - "Board minutes"
    - "Executive approvals"
    - "Contract negotiations"
    - "Audit interviews"

notes:
  - "This unified library eliminates duplicate control implementation"
  - "Cross-framework mappings enable efficient multi-compliance"
  - "Evidence once collected serves multiple frameworks"
  - "Maturity scoring drives continuous improvement"
  - "Weighted scoring accounts for deployment model (on-prem vs cloud)"
