# Unified Saudi Regulatory Control Library
# Integrates ECC (114 controls) + CCC (183 controls) + PDPL (28 operational controls)
# Version: 1.0
# Last Updated: 2024

metadata:
  name: "Saudi Unified GRC Control Library"
  version: "1.0"
  frameworks:
    - id: ECC
      name: "Essential Cybersecurity Controls"
      authority: "NCA"
      total_controls: 114
    - id: CCC
      name: "Cloud Cybersecurity Controls"
      authority: "NCA"
      total_controls: 183
    - id: PDPL
      name: "Personal Data Protection Law"
      authority: "SDAIA"
      total_controls: 28
  
  integration_summary:
    total_unique_controls: 211  # Deduplicated across frameworks
    ecc_controls: 114
    ccc_unique_additions: 69    # CCC controls not in ECC
    pdpl_unique_additions: 28   # PDPL-specific privacy controls
    
  mapping_approach:
    - "ECC forms the baseline (114 controls)"
    - "CCC extends ECC with 69 cloud-specific controls"
    - "PDPL adds 28 privacy-focused controls"
    - "Cross-framework mappings enable unified compliance"

unified_control_domains:
  - domain_id: "governance"
    name_en: "Governance & Strategy"
    name_ar: "الحوكمة والاستراتيجية"
    controls:
      ecc: ["ECC-GV-1", "ECC-GV-2", "ECC-GV-3", "ECC-GV-4", "ECC-GV-5", "ECC-GV-6", "ECC-GV-7", "ECC-GV-8", "ECC-GV-9", "ECC-GV-10", "ECC-GV-11", "ECC-GV-12", "ECC-GV-13"]
      ccc: ["CCC-GOV-01", "CCC-GOV-02", "CCC-GOV-03", "CCC-GOV-04", "CCC-GOV-05", "CCC-GOV-06", "CCC-GOV-07", "CCC-GOV-08"]
      pdpl: ["PDPL-1", "PDPL-3", "PDPL-4"]
    total_controls: 24
    
  - domain_id: "risk_management"
    name_en: "Risk Management"
    name_ar: "إدارة المخاطر"
    controls:
      ecc: ["ECC-GV-3"]
      ccc: ["CCC-GOV-03"]
