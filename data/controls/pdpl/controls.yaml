controls:
  # ============================================
  # Chapter 1: General Provisions (Articles 1-6)
  # ============================================
  
  - control_id: PDPL-1
    article_number: 1
    chapter: 1
    title_en: "Objectives of the Law"
    title_ar: "أهداف النظام"
    reference: "PDPL Royal Decree M/19, Article 1"
    
    official_text_en: |
      This Law aims to regulate the processing of personal data to ensure the privacy of individuals, 
      protect their personal data, and maintain their rights guaranteed by Islamic Sharia and applicable regulations.
    
    official_text_ar: |
      يهدف هذا النظام إلى تنظيم معالجة البيانات الشخصية لضمان خصوصية الأفراد وحماية بياناتهم الشخصية 
      والحفاظ على حقوقهم المكفولة بالشريعة الإسلامية والأنظمة السارية.
    
    intent_en: |
      Establish the legal foundation for data protection in Saudi Arabia. This article sets the strategic 
      direction that all subsequent articles must support: privacy protection, data security, and rights preservation.
    
    intent_ar: |
      إنشاء الأساس القانوني لحماية البيانات في المملكة العربية السعودية. تضع هذه المادة الاتجاه 
      الاستراتيجي الذي يجب أن تدعمه جميع المواد اللاحقة: حماية الخصوصية، وأمن البيانات، والحفاظ على الحقوق.
    
    applicability:
      entity_types: ["all"]  # Applies to all data controllers and processors
      data_categories: ["all_personal_data"]
      mandatory: true
    
    implementation_outcomes:
      - outcome_en: "Privacy policy published referencing PDPL compliance commitment"
        outcome_ar: "سياسة الخصوصية منشورة بالإشارة إلى التزام الامتثال لـ PDPL"
      - outcome_en: "Data protection impact assessment (DPIA) framework established"
        outcome_ar: "إطار تقييم أثر حماية البيانات (DPIA) منشأ"
      - outcome_en: "Personal data inventory identifying all processing activities"
        outcome_ar: "جرد البيانات الشخصية يحدد جميع أنشطة المعالجة"
      - outcome_en: "Privacy-by-design principles integrated into system development"
        outcome_ar: "مبادئ الخصوصية حسب التصميم متكاملة في تطوير النظام"
    
    evidence_requirements:
      - evidence_type: privacy_policy
        format: ["PDF", "HTML"]
        frequency: annual
        owner_role: "Data Protection Officer"
        retention_years: 7
        sample_available: true
      - evidence_type: data_processing_inventory
        format: ["XLSX"]
        frequency: quarterly
        owner_role: "Data Protection Officer"
        retention_years: 7
        sample_available: true
      - evidence_type: dpia_framework
        format: ["PDF", "DOCX"]
        frequency: annual
        owner_role: "Data Protection Officer"
        retention_years: 7
        sample_available: true
    
    operational_control: false  # Strategic article, not directly auditable
    cross_framework_mapping:
      ECC: ["ECC-GV-1"]
      CCC: ["CCC-GOV-01"]
      ISO27001: ["5.1"]
      ISO27701: ["4.1", "5.1"]
      GDPR: ["Article 1"]

  # ============================================
  # Chapter 2: Data Processing Conditions (Articles 7-12)
  # ============================================
  
  - control_id: PDPL-7
    article_number: 7
    chapter: 2
    title_en: "Lawfulness of Processing"
    title_ar: "مشروعية المعالجة"
    reference: "PDPL Royal Decree M/19, Article 7"
    
    official_text_en: |
      Personal data shall not be processed except if at least one of the following conditions is met:
      1. The data subject has given explicit consent
      2. Processing is necessary for the performance of a contract
      3. Compliance with a legal obligation
      4. Protection of vital interests of the data subject
      5. Performance of a task carried out in the public interest
      6. Pursuit of legitimate interests (except where overridden by data subject rights)
    
    official_text_ar: |
      لا يجوز معالجة البيانات الشخصية إلا إذا توافر أحد الشروط الآتية على الأقل:
      ١- موافقة صاحب البيانات الشخصية بشكل صريح
      ٢- ضرورة المعالجة لتنفيذ عقد
      ٣- الامتثال لالتزام قانوني
      ٤- حماية المصالح الحيوية لصاحب البيانات
      ٥- أداء مهمة تُنفذ للمصلحة العامة
      ٦- تحقيق مصالح مشروعة (إلا إذا تعارضت مع حقوق صاحب البيانات)
    
    intent_en: |
      Establish the legal basis requirements for all personal data processing. Organizations must identify 
      and document the lawful basis for each processing activity. Consent is one option but not always required.
    
    intent_ar: |
      إنشاء متطلبات الأساس القانوني لجميع معالجة البيانات الشخصية. يجب على المنظمات تحديد 
      وتوثيق الأساس القانوني لكل نشاط معالجة. الموافقة خيار واحد ولكنها ليست مطلوبة دائماً.
    
    applicability:
      entity_types: ["all"]
      data_categories: ["all_personal_data"]
      mandatory: true
    
    implementation_outcomes:
      - outcome_en: "Lawful basis documented for every data processing activity"
        outcome_ar: "الأساس القانوني موثق لكل نشاط معالجة بيانات"
      - outcome_en: "Consent management system for consent-based processing"
        outcome_ar: "نظام إدارة الموافقة للمعالجة القائمة على الموافقة"
      - outcome_en: "Record of Processing Activities (RoPA) maintained"
        outcome_ar: "سجل أنشطة المعالجة (RoPA) محفوظ"
      - outcome_en: "Legitimate interest assessments (LIA) documented where applicable"
        outcome_ar: "تقييمات المصالح المشروعة (LIA) موثقة عند الاقتضاء"
      - outcome_en: "Contractual data processing documented in agreements"
        outcome_ar: "معالجة البيانات التعاقدية موثقة في الاتفاقيات"
    
    evidence_requirements:
      - evidence_type: record_of_processing_activities
        format: ["XLSX", "PDF"]
        frequency: quarterly
        owner_role: "Data Protection Officer"
        retention_years: 7
        sample_available: true
      - evidence_type: consent_records
        format: ["Database Export"]
        frequency: ongoing
        owner_role: "System Administrator"
        retention_years: 7
        sample_available: true
      - evidence_type: legitimate_interest_assessments
        format: ["PDF", "DOCX"]
        frequency: per_activity
        owner_role: "Data Protection Officer"
        retention_years: 7
        sample_available: true
      - evidence_type: data_processing_agreements
        format: ["PDF"]
        frequency: per_contract
        owner_role: "Legal Department"
        retention_years: 10
        sample_available: false
    
    test_procedure:
      method: "Document Review & Process Validation"
      steps:
        - step_en: "Review Record of Processing Activities for lawful basis documentation"
          step_ar: "مراجعة سجل أنشطة المعالجة لتوثيق الأساس القانوني"
        - step_en: "Sample 10 processing activities to verify lawful basis identification"
          step_ar: "عينة من 10 أنشطة معالجة للتحقق من تحديد الأساس القانوني"
        - step_en: "For consent-based processing, verify consent management system implementation"
          step_ar: "للمعالجة القائمة على الموافقة، التحقق من تنفيذ نظام إدارة الموافقة"
        - step_en: "Review LIAs for legitimate interest processing"
          step_ar: "مراجعة تقييمات المصالح المشروعة للمعالجة القائمة على المصلحة المشروعة"
      sampling: "Review RoPA and sample 10 diverse processing activities"
      expected_result: "All processing activities have documented lawful basis per Article 7"
    
    operational_control: true
    priority: critical
    maturity_target: 4
    implementation_complexity: high
    estimated_effort_days: 45
    
    cross_framework_mapping:
      ECC: ["ECC-DP-15"]  # Data protection
      CCC: ["CCC-DEF-28"]  # Cloud data protection
      ISO27001: ["5.32", "5.33"]  # Personal data protection
      ISO27701: ["5.2.1", "6.2.1"]  # Lawful basis
      GDPR: ["Article 6"]

  # ============================================
  # Chapter 3: Rights of Data Subject (Articles 13-18)
  # ============================================
  
  - control_id: PDPL-13
    article_number: 13
    chapter: 3
    title_en: "Right to Access"
    title_ar: "حق الوصول"
    reference: "PDPL Royal Decree M/19, Article 13"
    
    official_text_en: |
      The data subject has the right to obtain from the data controller confirmation of whether personal data 
      concerning them is being processed, and if so, to access the personal data and the following information:
      1. The purposes of processing
      2. The categories of personal data
      3. The recipients or categories of recipients
      4. The retention period
      5. The existence of rights (rectification, erasure, restriction, objection)
      6. The right to lodge a complaint with SDAIA
      7. The source of data if not collected from the data subject
    
    official_text_ar: |
      لصاحب البيانات الحق في الحصول من مراقب البيانات على تأكيد ما إذا كانت البيانات الشخصية 
      المتعلقة به تُعالج أم لا، وإذا كان الأمر كذلك، الوصول إلى البيانات الشخصية والمعلومات التالية:
      ١- أغراض المعالجة
      ٢- فئات البيانات الشخصية
      ٣- المستلمون أو فئات المستلمين
      ٤- فترة الاحتفاظ
      ٥- وجود الحقوق (التصحيح، المحو، التقييد، الاعتراض)
      ٦- الحق في تقديم شكوى إلى سدايا
      ٧- مصدر البيانات إن لم تُجمع من صاحب البيانات
    
    intent_en: |
      Enable data subjects to understand how their personal data is being used. This transparency right 
      is fundamental to data protection and must be fulfilled within 30 days of request.
    
    intent_ar: |
      تمكين أصحاب البيانات من فهم كيفية استخدام بياناتهم الشخصية. حق الشفافية هذا 
      أساسي لحماية البيانات ويجب الوفاء به في غضون 30 يوماً من الطلب.
    
    applicability:
      entity_types: ["all"]
      data_categories: ["all_personal_data"]
      mandatory: true
    
    implementation_outcomes:
      - outcome_en: "Data Subject Access Request (DSAR) process documented and published"
        outcome_ar: "عملية طلب الوصول لصاحب البيانات (DSAR) موثقة ومنشورة"
      - outcome_en: "DSAR submission channels available (web form, email, mail)"
        outcome_ar: "قنوات تقديم طلب الوصول متاحة (نموذج ويب، بريد إلكتروني، بريد)"
      - outcome_en: "30-day response SLA for DSAR fulfillment"
        outcome_ar: "اتفاقية مستوى خدمة 30 يوماً لتلبية طلب الوصول"
      - outcome_en: "DSAR log maintained tracking all requests and responses"
        outcome_ar: "سجل طلبات الوصول محفوظ لتتبع جميع الطلبات والردود"
      - outcome_en: "Automated DSAR response system for structured data"
        outcome_ar: "نظام استجابة آلي لطلبات الوصول للبيانات المهيكلة"
      - outcome_en: "Identity verification process for DSAR requesters"
        outcome_ar: "عملية التحقق من الهوية لمقدمي طلبات الوصول"
    
    evidence_requirements:
      - evidence_type: dsar_policy_procedure
        format: ["PDF", "DOCX"]
        frequency: annual
        owner_role: "Data Protection Officer"
        retention_years: 7
        sample_available: true
      - evidence_type: dsar_request_log
        format: ["XLSX", "Database"]
        frequency: ongoing
        owner_role: "Privacy Team"
        retention_years: 7
        sample_available: true
      - evidence_type: dsar_response_samples
        format: ["PDF"]
        frequency: per_request
        owner_role: "Privacy Team"
        retention_years: 7
        sample_available: true
      - evidence_type: dsar_sla_compliance_report
        format: ["PDF", "XLSX"]
        frequency: monthly
        owner_role: "Data Protection Officer"
        retention_years: 3
        sample_available: true
    
    test_procedure:
      method: "Process Testing & Record Review"
      steps:
        - step_en: "Review DSAR policy and procedure documentation"
          step_ar: "مراجعة سياسة وإجراءات طلب الوصول"
        - step_en: "Verify DSAR submission channels are accessible and functional"
          step_ar: "التحقق من أن قنوات تقديم طلب الوصول متاحة وعملية"
        - step_en: "Sample 10 DSAR requests to verify 30-day response compliance"
          step_ar: "عينة من 10 طلبات وصول للتحقق من الامتثال للاستجابة في 30 يوماً"
        - step_en: "Review DSAR responses for completeness per Article 13 requirements"
          step_ar: "مراجعة ردود طلبات الوصول للاكتمال حسب متطلبات المادة 13"
        - step_en: "Test identity verification process with mock DSAR"
          step_ar: "اختبار عملية التحقق من الهوية بطلب وصول تجريبي"
      sampling: "Review last 6 months of DSAR log (minimum 10 requests or all if fewer)"
      expected_result: "Functional DSAR process with >90% compliance to 30-day SLA"
    
    operational_control: true
    priority: critical
    maturity_target: 4
    implementation_complexity: high
    estimated_effort_days: 40
    penalties:
      violation_type: "Failure to respond to DSAR within 30 days"
      fine_range_sar: "100,000 - 1,000,000"
      fine_range_usd: "26,667 - 266,667"
    
    cross_framework_mapping:
      ECC: ["ECC-DP-16"]
      CCC: ["CCC-DEF-29"]
      ISO27001: ["5.32"]
      ISO27701: ["5.2.4", "6.2.3"]
      GDPR: ["Article 15"]

  # ============================================
  # Chapter 4: Obligations of Controller/Processor (Articles 19-30)
  # ============================================
  
  - control_id: PDPL-19
    article_number: 19
    chapter: 4
    title_en: "Data Breach Notification"
    title_ar: "الإخطار بخرق البيانات"
    reference: "PDPL Royal Decree M/19, Article 19"
    
    official_text_en: |
      In case of a personal data breach, the data controller shall notify SDAIA within 72 hours of 
      becoming aware of the breach. If the breach is likely to result in a high risk to the rights of 
      data subjects, the controller shall also notify the affected data subjects without undue delay.
    
    official_text_ar: |
      في حال حدوث خرق للبيانات الشخصية، يجب على مراقب البيانات إخطار سدايا خلال 72 ساعة 
      من علمه بالخرق. إذا كان من المحتمل أن يؤدي الخرق إلى مخاطر عالية على حقوق أصحاب البيانات، 
      يجب على المراقب أيضاً إخطار أصحاب البيانات المتأثرين دون تأخير لا مبرر له.
    
    intent_en: |
      Ensure rapid detection and reporting of data breaches to enable regulatory oversight and protect 
      affected individuals. The 72-hour window is strict and requires mature incident response capabilities.
    
    intent_ar: |
      ضمان الكشف السريع والإبلاغ عن خروقات البيانات لتمكين الرقابة التنظيمية وحماية 
      الأفراد المتأثرين. نافذة الـ 72 ساعة صارمة وتتطلب قدرات استجابة ناضجة للحوادث.
    
    applicability:
      entity_types: ["all"]
      data_categories: ["all_personal_data"]
      mandatory: true
    
    implementation_outcomes:
      - outcome_en: "Data breach response plan documented and tested annually"
        outcome_ar: "خطة الاستجابة لخرق البيانات موثقة ومختبرة سنوياً"
      - outcome_en: "72-hour breach notification process to SDAIA established"
        outcome_ar: "عملية إخطار خرق 72 ساعة إلى سدايا منشأة"
      - outcome_en: "Breach impact assessment framework for high-risk determination"
        outcome_ar: "إطار تقييم أثر الخرق لتحديد المخاطر العالية"
      - outcome_en: "Data subject notification templates and communication plan"
        outcome_ar: "قوالب إخطار أصحاب البيانات وخطة الاتصال"
      - outcome_en: "Breach incident log maintained with all breach details"
        outcome_ar: "سجل حوادث الخرق محفوظ مع جميع تفاصيل الخرق"
      - outcome_en: "Security monitoring and detection systems for breach identification"
        outcome_ar: "أنظمة المراقبة والكشف الأمني لتحديد الخرق"
    
    evidence_requirements:
      - evidence_type: breach_response_plan
        format: ["PDF", "DOCX"]
        frequency: annual
        owner_role: "Data Protection Officer"
        retention_years: 7
        sample_available: true
      - evidence_type: breach_incident_log
        format: ["XLSX", "Database"]
        frequency: ongoing
        owner_role: "Incident Response Team"
        retention_years: 7
        sample_available: true
      - evidence_type: sdaia_breach_notifications
        format: ["PDF", "Email"]
        frequency: per_breach
        owner_role: "Data Protection Officer"
        retention_years: 7
        sample_available: false
      - evidence_type: data_subject_breach_notifications
        format: ["Email", "SMS", "Letter"]
        frequency: per_breach
        owner_role: "Communications Team"
        retention_years: 7
        sample_available: true
      - evidence_type: breach_response_test_report
        format: ["PDF"]
        frequency: annual
        owner_role: "Incident Response Team"
        retention_years: 3
        sample_available: true
    
    test_procedure:
      method: "Process Testing & Incident Review"
      steps:
        - step_en: "Review breach response plan for 72-hour notification procedure"
          step_ar: "مراجعة خطة الاستجابة للخرق لإجراء إخطار 72 ساعة"
        - step_en: "Conduct tabletop exercise simulating breach notification workflow"
          step_ar: "إجراء تمرين سطح المكتب يحاكي سير عمل إخطار الخرق"
        - step_en: "Review breach incident log (if breaches occurred)"
          step_ar: "مراجعة سجل حوادث الخرق (في حال حدوث خروقات)"
        - step_en: "Verify SDAIA notification within 72 hours for actual breaches"
          step_ar: "التحقق من إخطار سدايا خلال 72 ساعة للخروقات الفعلية"
        - step_en: "Review high-risk breach determination criteria and data subject notifications"
          step_ar: "مراجعة معايير تحديد الخرق عالي المخاطر وإخطارات أصحاب البيانات"
      sampling: "Review all breaches in last 12 months or test with simulation"
      expected_result: "Breach response plan with evidence of 72-hour notification capability"
    
    operational_control: true
    priority: critical
    maturity_target: 4
    implementation_complexity: high
    estimated_effort_days: 35
    penalties:
      violation_type: "Failure to notify SDAIA within 72 hours"
      fine_range_sar: "1,000,000 - 3,000,000"
      fine_range_usd: "266,667 - 800,000"
      additional: "Potential criminal liability for intentional violations"
    
    cross_framework_mapping:
      ECC: ["ECC-RE-5", "ECC-RE-6"]  # Incident response
      CCC: ["CCC-RES-15", "CCC-RES-16"]
      ISO27001: ["5.24", "5.25", "5.26", "5.27"]
      ISO27701: ["5.5.1"]
      NIST_CSF: ["DE.AE-02", "RS.CO-02"]
      GDPR: ["Article 33", "Article 34"]

