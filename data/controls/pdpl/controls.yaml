# Saudi Personal Data Protection Law (PDPL)
# Saudi Data & AI Authority (SDAIA)
# Law issued by Royal Decree No. M/19 dated 9/2/1443H (2021)
# Total Articles: 44 (28 operational controls)
# Reference: https://sdaia.gov.sa/en/PDPL/

metadata:
  framework: PDPL
  version: "1.0"
  enactment_date: "2021-09-14"
  effective_date: "2023-03-14"  # 18 months after enactment
  authority: "Saudi Data & AI Authority (SDAIA)"
  country: "Saudi Arabia"
  language: ["ar", "en"]
  total_articles: 44
  operational_controls: 28
  chapters:
    - id: 1
      name_en: "General Provisions"
      name_ar: "أحكام عامة"
      articles: "1-6"
    - id: 2
