  total_articles: 44
  strategic_articles: 6
  operational_controls: 28
  penalty_articles: 10
  
  key_deadlines:
    dsar_response: "30 days"
    breach_notification_sdaia: "72 hours"
    breach_notification_subjects: "without undue delay (if high risk)"
    data_retention_limits: "as necessary for purpose"
    dpo_appointment: "required for controllers processing sensitive data at scale"
  
  key_registers_required:
