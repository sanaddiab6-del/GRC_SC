# NCA Essential Cybersecurity Controls (ECC)
# Saudi National Cybersecurity Authority
# Version: 1.0 (2022)
# Total Controls: 114 across 5 domains
# Reference: https://nca.gov.sa/pages/ecc.html

metadata:
  framework: ECC
  version: "1.0"
  release_date: "2022-01-01"
  authority: "National Cybersecurity Authority (NCA)"
  country: "Saudi Arabia"
  language: ["ar", "en"]
  total_controls: 114
  domains:
    - id: GV
      name_en: "Governance"
      name_ar: "الحوكمة"
      control_count: 13
    - id: DP
      name_en: "Defense"
      name_ar: "الدفاع"
      control_count: 35
    - id: RE
      name_en: "Resilience"
      name_ar: "المرونة"
      control_count: 28
    - id: TM
      name_en: "Third-Party and Cloud Computing Management"
      name_ar: "إدارة الطرف الثالث والحوسبة السحابية"
      control_count: 22
    - id: IC
      name_en: "Industrial Control Systems"
      name_ar: "أنظمة التحكم الصناعية"
      control_count: 16

controls:
  # ============================================
  # Domain 1: Governance (GV) - 13 Controls
  # ============================================
  - control_id: ECC-GV-1
    domain: GV
    subdomain: "Cybersecurity Governance"
    title_en: "Cybersecurity Governance Framework"
    title_ar: "إطار حوكمة الأمن السيبراني"
    reference: "ECC v1.0, Section 1.1, Page 12"
    
    official_text_en: |
      The organization shall establish and maintain a comprehensive cybersecurity governance framework 
      that ensures effective oversight, accountability, and decision-making processes for cybersecurity activities.
    
    official_text_ar: |
      يجب على المنظمة إنشاء والحفاظ على إطار شامل لحوكمة الأمن السيبراني يضمن الرقابة الفعالة 
      والمساءلة وعمليات اتخاذ القرار لأنشطة الأمن السيبراني.
    
    intent_en: |
      Establish a structured approach to cybersecurity governance that defines roles, responsibilities, 
      and decision-making authority at all organizational levels. Ensure board-level oversight and 
      executive accountability for cybersecurity risk management.
    
    intent_ar: |
      إنشاء نهج منظم لحوكمة الأمن السيبراني يحدد الأدوار والمسؤوليات وسلطة اتخاذ القرار 
      على جميع المستويات التنظيمية. ضمان الإشراف على مستوى مجلس الإدارة والمساءلة التنفيذية 
      لإدارة مخاطر الأمن السيبراني.
    
    applicability:
      entity_types: ["government", "critical_infrastructure", "financial", "health", "telecom", "education"]
      deployment_models: ["on-premise", "cloud", "hybrid"]
      data_sensitivity: ["public", "internal", "confidential", "restricted"]
      mandatory: true
    
    implementation_outcomes:
      - outcome_en: "Board-approved cybersecurity governance policy documented and communicated"
        outcome_ar: "سياسة حوكمة الأمن السيبراني المعتمدة من مجلس الإدارة موثقة ومبلغة"
      - outcome_en: "Organizational structure with defined cybersecurity roles and reporting lines"
        outcome_ar: "هيكل تنظيمي بأدوار محددة للأمن السيبراني وخطوط إبلاغ"
      - outcome_en: "Quarterly governance reviews conducted with executive participation"
        outcome_ar: "مراجعات ربع سنوية للحوكمة تُجرى بمشاركة تنفيذية"
      - outcome_en: "Risk committee established with cybersecurity agenda items"
        outcome_ar: "لجنة مخاطر منشأة مع بنود جدول أعمال الأمن السيبراني"
      - outcome_en: "Governance metrics tracked and reported to board quarterly"
        outcome_ar: "مقاييس الحوكمة تُتبع وتُبلغ إلى مجلس الإدارة ربع سنوياً"
    
    evidence_requirements:
      - evidence_type: governance_policy
        format: ["PDF", "DOCX"]
        frequency: annual
        owner_role: "CISO"
        retention_years: 7
        sample_available: true
      - evidence_type: organizational_chart
        format: ["PDF", "Visio"]
        frequency: quarterly
        owner_role: "CISO"
        retention_years: 3
        sample_available: true
      - evidence_type: board_minutes
        format: ["PDF"]
        frequency: quarterly
        owner_role: "Board Secretary"
        retention_years: 10
        sample_available: false
      - evidence_type: governance_review_reports
        format: ["PDF", "DOCX"]
        frequency: quarterly
        owner_role: "CISO"
        retention_years: 5
        sample_available: true
    
    test_procedure:
      method: "Document Review & Interview"
      steps:
        - step_en: "Review cybersecurity governance policy for board approval signature"
          step_ar: "مراجعة سياسة حوكمة الأمن السيبراني للحصول على توقيع الموافقة من مجلس الإدارة"
        - step_en: "Verify organizational chart shows CISO reporting to CEO/Board"
          step_ar: "التحقق من أن المخطط التنظيمي يظهر رئيس أمن المعلومات تحت رئيس المؤسسة/المجلس"
        - step_en: "Sample 4 quarterly board minutes to confirm cybersecurity discussions"
          step_ar: "عينة من 4 محاضر مجلس ربع سنوية لتأكيد مناقشات الأمن السيبراني"
        - step_en: "Interview CISO to validate governance process maturity"
          step_ar: "مقابلة رئيس أمن المعلومات للتحقق من نضج عملية الحوكمة"
      sampling: "Review last 12 months of governance artifacts"
      expected_result: "Governance framework documented, approved, and actively used for decision-making"
    
    cross_framework_mapping:
      CCC: ["CCC-GV-1"]
      PDPL: ["Article 3"]
      ISO27001: ["5.1", "5.2", "5.3"]
      NIST_CSF: ["GV.OC-01", "GV.RR-01", "GV.PO-01"]
      SAMA: ["CSF-GV-1.1"]
    
    priority: critical
    maturity_target: 4  # Managed and measurable
    implementation_complexity: high
    estimated_effort_days: 45

  - control_id: ECC-GV-2
    domain: GV
    subdomain: "Cybersecurity Governance"
    title_en: "Cybersecurity Strategy"
    title_ar: "استراتيجية الأمن السيبراني"
    reference: "ECC v1.0, Section 1.2, Page 14"
    
    official_text_en: |
      The organization shall develop and maintain a cybersecurity strategy aligned with business objectives, 
      risk appetite, and regulatory requirements. The strategy shall be reviewed and updated annually.
    
    official_text_ar: |
      يجب على المنظمة تطوير والحفاظ على استراتيجية للأمن السيبراني متوافقة مع أهداف العمل 
      ومستوى قبول المخاطر والمتطلبات التنظيمية. يجب مراجعة الاستراتيجية وتحديثها سنوياً.
    
    intent_en: |
      Create a multi-year cybersecurity roadmap that defines strategic objectives, initiatives, and 
      resource allocation. Ensure the strategy supports business goals and addresses evolving threats.
    
    intent_ar: |
      إنشاء خارطة طريق متعددة السنوات للأمن السيبراني تحدد الأهداف الاستراتيجية والمبادرات 
      وتخصيص الموارد. ضمان أن الاستراتيجية تدعم أهداف العمل وتعالج التهديدات المتطورة.
    
    applicability:
      entity_types: ["government", "critical_infrastructure", "financial", "health", "telecom", "education"]
      deployment_models: ["on-premise", "cloud", "hybrid"]
      data_sensitivity: ["public", "internal", "confidential", "restricted"]
      mandatory: true
    
    implementation_outcomes:
      - outcome_en: "3-5 year cybersecurity strategy document approved by board"
        outcome_ar: "وثيقة استراتيجية الأمن السيبراني لمدة 3-5 سنوات معتمدة من مجلس الإدارة"
      - outcome_en: "Strategic objectives aligned with business goals and risk appetite"
        outcome_ar: "الأهداف الاستراتيجية متوافقة مع أهداف العمل ومستوى قبول المخاطر"
      - outcome_en: "Annual strategy review conducted with updates documented"
        outcome_ar: "مراجعة استراتيجية سنوية تُجرى مع توثيق التحديثات"
      - outcome_en: "Budget allocation aligned with strategic priorities"
        outcome_ar: "تخصيص الميزانية متوافق مع الأولويات الاستراتيجية"
      - outcome_en: "Strategy implementation tracked with quarterly progress reports"
        outcome_ar: "تنفيذ الاستراتيجية يُتبع مع تقارير تقدم ربع سنوية"
    
    evidence_requirements:
      - evidence_type: cybersecurity_strategy
        format: ["PDF", "DOCX"]
        frequency: annual
        owner_role: "CISO"
        retention_years: 7
        sample_available: true
      - evidence_type: strategy_approval_board_resolution
        format: ["PDF"]
        frequency: annual
        owner_role: "Board Secretary"
        retention_years: 10
        sample_available: false
      - evidence_type: strategy_progress_reports
        format: ["PDF", "PPTX"]
        frequency: quarterly
        owner_role: "CISO"
        retention_years: 3
        sample_available: true
      - evidence_type: budget_allocation_cybersecurity
        format: ["XLSX"]
        frequency: annual
        owner_role: "CFO"
        retention_years: 7
        sample_available: false
    
    test_procedure:
      method: "Document Review & Gap Analysis"
      steps:
        - step_en: "Review cybersecurity strategy for completeness (objectives, initiatives, timeline, budget)"
          step_ar: "مراجعة استراتيجية الأمن السيبراني للاكتمال (الأهداف، المبادرات، الجدول الزمني، الميزانية)"
        - step_en: "Verify board approval through resolution or meeting minutes"
          step_ar: "التحقق من موافقة مجلس الإدارة من خلال قرار أو محاضر اجتماع"
        - step_en: "Confirm annual review process with dated review records"
          step_ar: "تأكيد عملية المراجعة السنوية مع سجلات مراجعة مؤرخة"
        - step_en: "Sample quarterly progress reports to validate implementation tracking"
          step_ar: "عينة من تقارير التقدم الربع سنوية للتحقق من تتبع التنفيذ"
      sampling: "Review current strategy and last 2 years of progress reports"
      expected_result: "Current, board-approved strategy with evidence of active implementation and tracking"
    
    cross_framework_mapping:
      CCC: ["CCC-GV-2"]
      PDPL: ["Article 4"]
      ISO27001: ["4.2", "6.2"]
      NIST_CSF: ["GV.OC-02", "GV.PO-02"]
      SAMA: ["CSF-GV-1.2"]
    
    priority: critical
    maturity_target: 4
    implementation_complexity: high
    estimated_effort_days: 30

  - control_id: ECC-GV-3
    domain: GV
    subdomain: "Risk Management"
    title_en: "Cybersecurity Risk Management"
    title_ar: "إدارة مخاطر الأمن السيبراني"
    reference: "ECC v1.0, Section 1.3, Page 16"
    
    official_text_en: |
      The organization shall establish and maintain a cybersecurity risk management program that identifies, 
      assesses, treats, and monitors cybersecurity risks. Risk assessments shall be conducted at least annually.
    
    official_text_ar: |
      يجب على المنظمة إنشاء والحفاظ على برنامج لإدارة مخاطر الأمن السيبراني يحدد ويقيم 
      ويعالج ويراقب مخاطر الأمن السيبراني. يجب إجراء تقييمات المخاطر سنوياً على الأقل.
    
    intent_en: |
      Implement a systematic approach to managing cybersecurity risks that enables informed decision-making 
      and resource allocation. Ensure risks are identified, prioritized, and treated based on business impact.
    
    intent_ar: |
      تنفيذ نهج منهجي لإدارة مخاطر الأمن السيبراني يمكّن من اتخاذ قرارات مستنيرة وتخصيص الموارد. 
      ضمان تحديد المخاطر وترتيب أولوياتها ومعالجتها بناءً على تأثير العمل.
    
    applicability:
      entity_types: ["government", "critical_infrastructure", "financial", "health", "telecom", "education"]
      deployment_models: ["on-premise", "cloud", "hybrid"]
      data_sensitivity: ["internal", "confidential", "restricted"]
      mandatory: true
    
    implementation_outcomes:
      - outcome_en: "Risk management framework documented and board-approved"
        outcome_ar: "إطار إدارة المخاطر موثق ومعتمد من مجلس الإدارة"
      - outcome_en: "Annual risk assessments completed with executive review"
        outcome_ar: "تقييمات مخاطر سنوية مكتملة مع مراجعة تنفيذية"
      - outcome_en: "Risk register maintained with treatment plans for high/critical risks"
        outcome_ar: "سجل مخاطر محفوظ مع خطط علاج للمخاطر العالية/الحرجة"
      - outcome_en: "Risk appetite statement defined and communicated"
        outcome_ar: "بيان مستوى قبول المخاطر محدد ومبلغ"
      - outcome_en: "Quarterly risk monitoring reports provided to executive leadership"
        outcome_ar: "تقارير مراقبة المخاطر الربع سنوية مقدمة للقيادة التنفيذية"
    
    evidence_requirements:
      - evidence_type: risk_management_framework
        format: ["PDF", "DOCX"]
        frequency: annual
        owner_role: "CISO"
        retention_years: 7
        sample_available: true
      - evidence_type: risk_assessment_reports
        format: ["PDF", "XLSX"]
        frequency: annual
        owner_role: "Risk Manager"
        retention_years: 5
        sample_available: true
      - evidence_type: risk_register
        format: ["XLSX"]
        frequency: quarterly
        owner_role: "Risk Manager"
        retention_years: 5
        sample_available: true
      - evidence_type: risk_treatment_plans
        format: ["PDF", "DOCX"]
        frequency: as_needed
        owner_role: "Risk Manager"
        retention_years: 5
        sample_available: true
    
    test_procedure:
      method: "Document Review & Process Validation"
      steps:
        - step_en: "Review risk management framework for methodology completeness"
          step_ar: "مراجعة إطار إدارة المخاطر لاكتمال المنهجية"
        - step_en: "Verify annual risk assessment completion with dated reports"
          step_ar: "التحقق من إكمال تقييم المخاطر السنوي مع تقارير مؤرخة"
        - step_en: "Review risk register for completeness and treatment plan status"
          step_ar: "مراجعة سجل المخاطر للاكتمال وحالة خطة العلاج"
        - step_en: "Sample 3 high-risk items to validate treatment implementation"
          step_ar: "عينة من 3 عناصر مخاطر عالية للتحقق من تنفيذ العلاج"
      sampling: "Review current risk register and last 12 months of monitoring reports"
      expected_result: "Active risk management program with documented assessments and treatment tracking"
    
    cross_framework_mapping:
      CCC: ["CCC-GV-3"]
      PDPL: ["Article 5", "Article 27"]
      ISO27001: ["6.1.2", "6.1.3", "8.2"]
      NIST_CSF: ["GV.RM-01", "GV.RM-02", "GV.RM-03", "ID.RA-01"]
      SAMA: ["CSF-GV-1.3"]
    
    priority: critical
    maturity_target: 4
    implementation_complexity: high
    estimated_effort_days: 60

  # Add placeholder for remaining 111 controls
