<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICO GRC - Control Library (495 Controls)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px 40px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .stat-card {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        
        .filters {
            padding: 30px 40px;
            background: #fafafa;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .filter-group label {
            font-size: 0.85em;
            color: #666;
            font-weight: 600;
        }
        
        select, input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            background: white;
            min-width: 200px;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .controls-table {
            padding: 40px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #f8f9fa;
            position: sticky;
            top: 0;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .framework-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .framework-ECC {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .framework-CCC {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .framework-PDPL {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .framework-ISO27001 {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .control-id {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2em;
            color: #666;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            margin: 20px 40px;
            border-radius: 8px;
            border-left: 4px solid #c62828;
        }
        
        .pagination {
            padding: 30px 40px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .pagination button {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .pagination button:hover {
            background: #667eea;
            color: white;
        }
        
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .pagination .current-page {
            padding: 10px 20px;
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ SICO GRC Control Library</h1>
            <p>Complete NCA Compliance Framework - ECC, CCC & PDPL</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalControls">495</div>
                <div class="stat-label">Total Controls</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="eccCount">242</div>
                <div class="stat-label">ECC Controls</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="cccCount">171</div>
                <div class="stat-label">CCC Controls</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pdplCount">79</div>
                <div class="stat-label">PDPL Articles</div>
            </div>
        </div>
        
        <div class="filters">
            <div class="filter-group">
                <label for="frameworkFilter">Framework</label>
                <select id="frameworkFilter">
                    <option value="">All Frameworks</option>
                    <option value="ECC">ECC - Essential Cybersecurity Controls</option>
                    <option value="CCC">CCC - Cloud Cybersecurity Controls</option>
                    <option value="PDPL">PDPL - Personal Data Protection Law</option>
                    <option value="ISO27001">ISO 27001</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="searchBox">Search</label>
                <input type="text" id="searchBox" placeholder="Search by ID or title...">
            </div>
        </div>
        
        <div class="controls-table">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading controls from API...</p>
            </div>
            
            <div id="error" class="error" style="display: none;"></div>
            
            <table id="controlsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Control ID</th>
                        <th>Framework</th>
                        <th>Title (English)</th>
                        <th>Domain</th>
                        <th>Priority</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="pagination" id="pagination" style="display: none;">
            <button id="prevPage">← Previous</button>
            <span class="current-page">Page <span id="currentPage">1</span> of <span id="totalPages">1</span></span>
            <button id="nextPage">Next →</button>
        </div>
    </div>
    
    <script>
        let allControls = [];
        let currentPage = 1;
        const itemsPerPage = 50;
        
        // Fetch all controls from API
        async function fetchControls() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/controls?limit=1000');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                allControls = data.items || [];
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('controlsTable').style.display = 'table';
                document.getElementById('pagination').style.display = 'flex';
                
                updateStats();
                renderControls();
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                const errorDiv = document.getElementById('error');
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `
                    <strong>Error loading controls:</strong><br>
                    ${error.message}<br><br>
                    <small>Make sure the backend is running at http://localhost:8000</small>
                `;
            }
        }
        
        function updateStats() {
            const ecc = allControls.filter(c => c.framework === 'ECC').length;
            const ccc = allControls.filter(c => c.framework === 'CCC').length;
            const pdpl = allControls.filter(c => c.framework === 'PDPL').length;
            
            document.getElementById('totalControls').textContent = allControls.length;
            document.getElementById('eccCount').textContent = ecc;
            document.getElementById('cccCount').textContent = ccc;
            document.getElementById('pdplCount').textContent = pdpl;
        }
        
        function renderControls() {
            const framework = document.getElementById('frameworkFilter').value;
            const search = document.getElementById('searchBox').value.toLowerCase();
            
            let filtered = allControls.filter(control => {
                const matchesFramework = !framework || control.framework === framework;
                const matchesSearch = !search || 
                    control.control_id.toLowerCase().includes(search) ||
                    (control.title_en || '').toLowerCase().includes(search);
                return matchesFramework && matchesSearch;
            });
            
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageControls = filtered.slice(start, end);
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            pageControls.forEach(control => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="control-id">${control.control_id}</span></td>
                    <td><span class="framework-badge framework-${control.framework}">${control.framework}</span></td>
                    <td>${control.title_en || 'N/A'}</td>
                    <td>${control.domain || 'N/A'}</td>
                    <td>${control.priority || 'medium'}</td>
                `;
                tbody.appendChild(row);
            });
            
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages || 1;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
        }
        
        // Event listeners
        document.getElementById('frameworkFilter').addEventListener('change', () => {
            currentPage = 1;
            renderControls();
        });
        
        document.getElementById('searchBox').addEventListener('input', () => {
            currentPage = 1;
            renderControls();
        });
        
        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderControls();
            }
        });
        
        document.getElementById('nextPage').addEventListener('click', () => {
            currentPage++;
            renderControls();
        });
        
        // Initialize
        fetchControls();
    </script>
</body>
</html>
